<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pathology MCQ Bank</title>
<style>
:root{
  --bg:#f6efe5;
  --panel:#efe5d8;
  --card:#ffffff;
  --surface:#f3ebdf;
  --text:#1f1917;
  --muted:#7b6f68;
  --line:#dfd3c4;
  --accent:#5b1321;
  --accent-2:#7b2233;
  --correct:#2f7d32;
  --correct-bg:#edf7ee;
  --wrong:#bb2f2f;
  --wrong-bg:#fdeeee;
  --gold:#fff4cf;
  --gold-line:#e4c772;
  --shadow:0 14px 30px rgba(71,45,28,.08);
  --radius:20px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.45), transparent 28%),
    linear-gradient(180deg, #f8f2e9 0%, var(--bg) 100%);
  color:var(--text);
}
button,input{font:inherit}
.app-shell{
  display:grid;
  grid-template-columns:320px minmax(0,1fr);
  min-height:100vh;
}
.sidebar{
  background:linear-gradient(180deg, #f2e7da 0%, #ede1d4 100%);
  border-right:1px solid var(--line);
  padding:22px 18px 18px;
  position:sticky;
  top:0;
  height:100vh;
  overflow:auto;
}
.brand{
  padding:8px 6px 18px;
  border-bottom:1px solid var(--line);
  margin-bottom:18px;
}
.brand h1{
  margin:0 0 6px;
  font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
  font-weight:700;
  letter-spacing:.2px;
  font-size:28px;
  color:var(--accent);
}
.brand p{
  margin:0;
  color:var(--muted);
  line-height:1.5;
  font-size:13.5px;
}
.byline{
  margin-top:10px;
  color:var(--muted);
  font-size:12px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
.filter-block{margin-bottom:18px}
.filter-title{
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.14em;
  color:var(--muted);
  margin:0 0 10px;
  font-weight:700;
}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  border:1px solid var(--line);
  background:rgba(255,255,255,.58);
  color:var(--text);
  border-radius:999px;
  padding:8px 12px;
  min-height:38px;
  cursor:pointer;
  transition:.18s ease;
  font-size:13px;
  line-height:1;
  display:inline-flex;
  align-items:center;
  gap:8px;
  user-select:none;
}
.chip:hover{transform:translateY(-1px); background:#fff}
.chip.active{background:var(--accent); color:#fff; border-color:var(--accent)}
.chip.mono{font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace}
.lessons{display:flex;flex-direction:column;gap:10px}
.lesson-btn{
  width:100%;
  text-align:left;
  border:1px solid var(--line);
  background:rgba(255,255,255,.72);
  border-radius:16px;
  padding:12px 14px;
  cursor:pointer;
  transition:.18s ease;
  box-shadow:0 3px 12px rgba(84,55,32,.04);
}
.lesson-btn:hover{transform:translateY(-1px); background:#fff}
.lesson-btn.active{
  background:linear-gradient(180deg, #6c1a2a 0%, var(--accent) 100%);
  color:#fff;
  border-color:var(--accent);
}
.lesson-top{display:flex;justify-content:space-between;align-items:start;gap:12px}
.lesson-title{font-weight:700; line-height:1.35; font-size:14px}
.lesson-meta{margin-top:8px; display:flex; gap:8px; flex-wrap:wrap}
.tag{
  font-size:11px;
  border-radius:999px;
  padding:5px 8px;
  background:var(--surface);
  color:var(--muted);
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
.lesson-btn.active .tag{background:rgba(255,255,255,.12); color:rgba(255,255,255,.88)}
.main{min-width:0;padding:24px}
.hero, .card, .navigator-wrap, .results-card, .empty-card {
  background:var(--card);
  border:1px solid rgba(121,92,69,.12);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.hero{padding:24px 24px 20px;margin-bottom:18px}
.hero-top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;flex-wrap:wrap}
.hero h2{
  margin:0 0 8px;
  font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;
  font-size:34px;
  line-height:1.1;
  color:var(--accent);
}
.hero p{margin:0;color:var(--muted);line-height:1.6;font-size:14px;max-width:900px}
.stat-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.stat{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:16px;
  padding:10px 12px;
  min-width:108px;
}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
.stat-value{
  margin-top:6px;
  font-size:18px;
  font-weight:800;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
.progress-wrap{margin-top:18px}
.progress-line{height:12px;border-radius:999px;background:#eee4d7;overflow:hidden;border:1px solid var(--line)}
.progress-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent) 0%, #8b2940 100%);transition:width .22s ease}
.card{padding:22px;margin-bottom:18px}
.q-top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:14px}
.q-index{
  display:inline-flex;gap:8px;align-items:center;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)
}
.q-index .num{
  color:var(--accent);
  background:#f7f1ea;
  border:1px solid var(--line);
  border-radius:999px;
  padding:7px 10px;
  font-size:12px;
}
.year-tags{display:flex;gap:8px;flex-wrap:wrap}
.q-text{font-size:22px;line-height:1.55;margin:0}
.options{display:grid;gap:12px;margin-top:18px}
.option{
  width:100%;
  text-align:left;
  border:1px solid var(--line);
  background:#fff;
  border-radius:16px;
  padding:14px 16px;
  cursor:pointer;
  transition:background .16s ease, transform .12s ease, border-color .16s ease, box-shadow .16s ease;
  display:flex; gap:12px; align-items:flex-start;
}
.option:hover{transform:translateY(-1px); background:#fbf8f3}
.option.locked{cursor:default}
.option.pending{background:#f8f1e7;border-color:rgba(91,19,33,.22);box-shadow: inset 0 0 0 1px rgba(91,19,33,.08)}
.option.correct{
  background:var(--correct-bg);
  border-color:rgba(47,125,50,.35);
  box-shadow: inset 0 0 0 1px rgba(47,125,50,.18);
}
.option.incorrect{background:var(--wrong-bg);border-color:rgba(187,47,47,.28)}
.option .letter{
  width:32px;height:32px;border-radius:999px;flex:0 0 32px;
  display:grid;place-items:center;border:1px solid var(--line);
  background:#faf6f0;font-weight:800;font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}
.option.correct .letter{background:rgba(47,125,50,.12); border-color:rgba(47,125,50,.28); color:var(--correct)}
.option.incorrect .letter{background:rgba(187,47,47,.1); border-color:rgba(187,47,47,.22); color:var(--wrong)}
.option.selected-wrong{outline:2px solid rgba(187,47,47,.18)}
.option .body{min-width:0;flex:1}
.option .text{font-size:16px;line-height:1.45}
.option .meta{margin-top:6px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.option.pending .meta{color:var(--accent)}
.option.correct .meta{color:var(--correct)}
.option.incorrect .meta{color:var(--wrong)}
.controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center;margin-top:18px}
.control-left,.control-right{display:flex;flex-wrap:wrap;gap:10px}
.btn{
  border:none;border-radius:14px;padding:12px 16px;min-height:46px;cursor:pointer;transition:.16s ease;font-weight:700;
}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.48;cursor:not-allowed;transform:none}
.btn.primary{background:var(--accent);color:#fff}
.btn.secondary{background:var(--surface); color:var(--text); border:1px solid var(--line)}
.btn.ghost{background:#fff; color:var(--accent); border:1px solid rgba(91,19,33,.18)}
.btn.warn{background:#fff7f7;color:var(--wrong);border:1px solid rgba(187,47,47,.18)}
.explanation{
  margin-top:18px;
  background:linear-gradient(180deg,#fff6d7 0%, var(--gold) 100%);
  border:1px solid var(--gold-line);
  border-radius:18px;
  padding:18px;
  display:none;
}
.explanation.open{display:block; animation:fadeIn .18s ease}
.explanation h3{
  margin:0 0 12px;
  font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;
  color:#6b4b00;
  font-size:23px;
}
.expl-block + .expl-block{margin-top:14px}
.expl-label{font-size:11px;color:#7c6423;text-transform:uppercase;letter-spacing:.12em;font-weight:800;margin-bottom:6px}
.expl-text, .expl-list{font-size:15px;line-height:1.7;color:#3d3320}
.expl-list{margin:0;padding-left:18px}
.navigator-wrap{padding:20px;margin-bottom:18px}
.navigator-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.navigator-title{margin:0;font-size:15px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.navigator-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:10px}
.nav-chip{
  min-height:46px;
  border-radius:14px;border:1px solid var(--line);background:#fff;cursor:pointer;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size:14px;font-weight:800;transition:.14s ease;position:relative;
}
.nav-chip:hover{transform:translateY(-1px)}
.nav-chip.current{background:var(--accent);color:#fff;border-color:var(--accent)}
.nav-chip.correct{background:var(--correct-bg); color:var(--correct); border-color:rgba(47,125,50,.22)}
.nav-chip.wrong{background:var(--wrong-bg); color:var(--wrong); border-color:rgba(187,47,47,.22)}
.nav-chip.current.correct,.nav-chip.current.wrong{color:#fff}
.empty-card, .results-card{padding:28px}
.empty-card h3, .results-card h3{
  margin:0 0 10px;
  font-size:28px;
  line-height:1.15;
  font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;
  color:var(--accent);
}
.empty-card p, .results-card p{margin:0;color:var(--muted);line-height:1.65;font-size:15px}
.results-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:20px 0}
.results-box{padding:16px;border-radius:18px;background:var(--surface);border:1px solid var(--line)}
.results-box .k{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:800}
.results-box .v{margin-top:8px;font-size:28px;font-weight:900;font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace}
.footer-note{margin-top:12px;color:var(--muted);font-size:12px}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@media (max-width: 980px){
  .app-shell{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;border-right:none;border-bottom:1px solid var(--line)}
  .main{padding:16px}
  .hero h2{font-size:28px}
  .q-text{font-size:20px}
}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div id="app"></div>
  </main>
</div>

<script>
const LESSONS = [{"id": "L1", "title": "Introduction to Causes of Disease", "fullTitle": "L1 – Introduction to Causes of Disease", "questions": [{"id": "L1_Q1", "num": 1, "q": "A boy had a mutation in the CFTR gene, resulting in abnormal chloride conductance on the apical membrane of the epithelial cell. This defection ion transport leads to defective mucociliary clearance, causing mucus obstruction. After several years, he has acquired numerous bacterial infections and has clogged airways due to the thick mucus. He had to go on treatment. The above scenario is an example of which concept?", "opts": ["Pathogenesis", "Genetic derangement", "Complications", "Etiology"], "ans": 0, "years": ["2017"], "explanation": null}, {"id": "L1_Q2", "num": 2, "q": "A man has a long history of rheumatoid arthritis and recently developed systemic amyloidosis affecting the liver and the kidney, what are the kidney and liver diseases termed as?", "opts": ["Complication", "Manifestation", "Prognosis", "Pathogenesis"], "ans": 0, "years": ["2016"], "explanation": null}, {"id": "L1_Q3", "num": 3, "q": "Extensive research on one type of lung disease couldn’t uncover anyetiology leading to the disease. In what category is the disease best classified? (2016)", "opts": ["Congenital", "Acquired", "Iatrogenic", "Idiopathic"], "ans": 3, "years": ["2015", "2016"], "explanation": null}, {"id": "L1_Q4", "num": 4, "q": "A man with an abscess came to the hospital and had it excised. The lab identified staphylococcus aureus. Which of the following described s. Aureus?", "opts": ["Etiology", "Pathogenesis", "prognosis"], "ans": 0, "years": ["2015"], "explanation": null}, {"id": "L1_Q5", "num": 5, "q": "prediction of a 5-year survival plan of colon cancer is 60% What best describes this estimate?", "opts": ["Prognosis", "Complication", "Etiology", "Manifestation"], "ans": 0, "years": ["2016"], "explanation": null}, {"id": "L1_Q6", "num": 6, "q": "While operating on a 43-year old man, the surgeon accidentally injured his small intestine resulting in intestinal rupture. Under which category would you put this event?", "opts": ["Acquired", "Genetic", "Nutritional", "Iatrogenic"], "ans": 3, "years": ["2015"], "explanation": null}, {"id": "L1_Q7", "num": 7, "q": "A baby was born underweight. The doctors kept him in an incubator with % of oxygen. The baby developed vision loss. This occurred due to what?", "opts": ["Congenital disease", "Vitamin deficiencies", "Iatrogenic"], "ans": 2, "years": ["2013"], "explanation": null}, {"id": "L1_Q8", "num": 8, "q": "Which of the following is an idiopathic disease?", "opts": ["Crohn’s disease", "Neurofibromatosis"], "ans": 0, "years": ["2013"], "explanation": null}, {"id": "L1_Q9", "num": 9, "q": "A 34 year old woman underwent a mastectomy surgery to remove a malignant breast cancer. Which one of the following methods describes the diagnosis in the pathology lab?", "opts": ["Macroscopic testing is the golden standard that render the diagnosis", "Immunohistochemistry is the first step in microscopic examination", "It is preserved in alcohol for 24 hours to prevent the degeneration/breakdown of the specimen/cells", "H&E stain is used to stain the nucleus and cytoplasm respectively"], "ans": 3, "years": ["2020"], "explanation": null}, {"id": "L1_Q10", "num": 10, "q": "A nurse inserts a catheter into a 65 year old man with urinary retention. The man experiences pain and is said to have a urethra tear attributed to the inserted catheter. What does the urethra tear describe?", "opts": ["Etiology", "Sequela", "Iatrogenesis", "Pathogenesis"], "ans": 2, "years": ["2022"], "explanation": null}], "source": "booklet"}, {"id": "L2", "title": "Molecular basis of disease", "fullTitle": "L2 – Molecular basis of disease", "questions": [{"id": "L2_Q1", "num": 1, "q": "Chromosomal translocation in t(9:22) is diagnostic of myeloid leukemia. What contributes to the pathogenesis of this disease?", "opts": ["Decreased expression of P53", "Increased activity of tumor suppressors", "Increased activity of tyrosine kinase"], "ans": 2, "years": ["2017"], "explanation": null}, {"id": "L2_Q2", "num": 2, "q": "A 52 year old man came in with CML, further tests show a 9:22 translocation, what is the cause?", "opts": ["Activation of ABL results in high activity tyrosine kinase"], "ans": 0, "years": ["2016"], "explanation": null}, {"id": "L2_Q3", "num": 3, "q": "A defect that is present from birth?", "opts": ["Acquired", "Congenital", "Idiopathic"], "ans": 1, "years": ["2018"], "explanation": null}, {"id": "L2_Q4", "num": 4, "q": "Which is an exogenic factor that causes formation of mutated proteins? || What extrinsic factor changes protein function?", "opts": ["Enzyme deficiency", "Gene mutation", "Physical injuries", "Venom poison"], "ans": 3, "years": ["2018"], "explanation": null}, {"id": "L2_Q5", "num": 5, "q": "Which gene is affected in chronic myeloid leukemia?", "opts": ["BCR"], "ans": 0, "years": ["2013"], "explanation": null}, {"id": "L2_Q6", "num": 6, "q": "A 52 year old man came in with CML, further tests show translocation, what is the cause?", "opts": ["Translocation of ABL/BRC"], "ans": 0, "years": ["2019"], "explanation": null}, {"id": "L2_Q7", "num": 7, "q": "What is true about cystic fibrosis?", "opts": ["mutation result in defective chloride transport", "mutation result in increase in pathways"], "ans": 0, "years": ["2019"], "explanation": null}, {"id": "L2_Q8", "num": 8, "q": "How is diabetes related to insulin resistance?", "opts": ["activate adipocytokines that increase pancreatic enzymes activity", "activate adipocytokines that interferes with downstream insulin signals", "triggers an autoinmmune response"], "ans": 1, "years": ["2019"], "explanation": null}, {"id": "L2_Q9", "num": 9, "q": "There was a question about CML, 9:22 mutation", "opts": ["Inhibits tyrosine kinase activity"], "ans": 0, "years": ["2020"], "explanation": null}, {"id": "L2_Q10", "num": 10, "q": "What are biomarkers used for?", "opts": ["They are used for personalized diagnosis and treatment"], "ans": 0, "years": ["2020"], "explanation": null}, {"id": "L2_Q11", "num": 11, "q": "There was a question about AML( acute myeloid leukemia ) t(15:17)?", "opts": ["Enhance by all-trans retinoic acid", "Increased expression of retinoic acid receptor"], "ans": 0, "years": ["2020"], "explanation": null}, {"id": "L2_Q12", "num": 12, "q": "57.A young man with a history of multiple recurrent pulmonary infections since childhood. Lab investigation found elevated chlorine in his sweat. Which mutation characterizes his condition?", "opts": ["Beta globin gene mutation", "HER-2 gene amplification", "Chromosome t(15,17) translocation", "Mutation on CFTR gene"], "ans": 3, "years": ["2021"], "explanation": null}, {"id": "L2_Q13", "num": 13, "q": "A 60-year old man was diagnosed with colon adenocarcinoma. Cytogenetic analysis showed that cancer cells have RAS gene mutation. What is the most likely direct consequence of cancer cell mutation?", "opts": ["Autonomous growth", "Insensitivity to growth inhibition", "Replicative immortality", "Invasive immune response"], "ans": 0, "years": ["2022"], "explanation": null}, {"id": "L2_Q14", "num": 14, "q": "BCR-ABL inhibitor is an example of a successful drug emerging from understanding the molecular basis of cancer. How does it work on chronic chronic myeloid leukemia?", "opts": ["inhibiting tyrosine kinase counties proliferation signals", "killing the cancer cell by DNA damage", "increasing the expression of ABL gene", "activating the immune system against the cancer cell"], "ans": 0, "years": ["2022"], "explanation": null}, {"id": "L2_Q15", "num": 15, "q": "What causes the elderly to have a higher incidence of developing cancer than younger individuals?", "opts": ["DNA repair insufficiency"], "ans": 0, "years": ["2022"], "explanation": null}, {"id": "L2_Q16", "num": 16, "q": "Protein misfolding leads to", "opts": ["Breakdown of the Plasma membrane"], "ans": 0, "years": ["2022" asia", "Metaplasia", "Dysplasia"], "ans": 1, "years": ["2017"], "explanation": null}, {"id": "L3_Q3", "num": 3, "q": "A woman presents with soap formation on the pancreas, resulting in cell death. What kind of necrosis represent the above scenario?", "opts": ["Caseous", "Fat", "Gangrenous", "Liquefactive"], "ans": 1, "years": ["2017"], "explanation": null}, {"id": "L3_Q4", "num": 4, "q": "What pigment deposits in the heart muscle leading to brown atrophy?", "opts": ["Copper", "Iron", "Lipofuscin", "Melanin"], "ans": 2, "years": ["2016"], "explanation": null}, {"id": "L3_Q5", "num": 5, "q": "Which is attributed to cell hypertrophy?", "opts": ["Chronic inflammation of the uterine cervix", "Liver growth after partial resection", "Myometrial enlargement during pregnancy", "Thyroid enlargement due to iodine deficiency"], "ans": 2, "years": ["2016"], "explanation": null}, {"id": "L3_Q6", "num": 6, "q": "What is dystrophic calcification?", "opts": ["Deposition of calcium in dying tissue"], "ans": 0, "years": ["2015"], "explanation": null}, {"id": "L3_Q7", "num": 7, "q": "What occurs in chronic alcoholism?", "opts": ["Necrosis in the liver", "Liver atrophy", "Fatty liver"], "ans": 2, "years": ["2016"], "explanation": null}, {"id": "L3_Q8", "num": 8, "q": "What type of necrosis occurs in the brain tissue? (2015 final)", "opts": ["Liquefactive", "Casseous", "Coagulative"], "ans": 0, "years": ["2015", "2021"], "explanation": null}, {"id": "L3_Q9", "num": 9, "q": "What is the most essential process for the development of an embryo in utero?", "opts": ["Atrophy", "Hypertrophy", "Apoptosis", "Necrosis"], "ans": 2, "years": ["2014"], "explanation": null}, {"id": "L3_Q10", "num": 10, "q": "Sections of the liver from diabetic woman show normal architecture. Hepatocytes, however are distended from a large cytoplasmic vacuole. The liver function is normal. What is the finding?", "opts": ["It is a reversible cellular injury", "It is a histological artifact", "The finding is unrelated t , "questions": [{"id": "R1_Q1", "num": 1, "q": "Ischemia and other toxic injuries increase the accumulation of intracellular calcium as a result of:", "opts": ["release of stored calcium from the mitochondria.", "improved intracellular volume regulation.", "decreased influx across the cell membrane.", "attraction of calcium to fatty infiltrates."], "ans": 0, "years": [], "explanation": null}, {"id": "R1_Q2", "num": 2, "q": "The patient is found to have liver disease, resulting in the removal of a lobe of his liver. Adaptation to the reduced size of the liver leads to of the remaining liver cells.", "opts": ["metaplasia", "organ atrophy", "compensatory hyperplasia", "physiologic hypertrophy"], "ans": 2, "years": [], "explanation": null}, {"id": "R1_Q3", "num": 3, "q": "A person eating peanuts starts choking and collapses. His airway obstruction is partially cleared, but he remains hypoxic until he reaches the hospital. The prolonged cell hypoxia caused a cerebral infarction and resulting in the brain.", "opts": ["caspase activation", "coagulation necrosis", "rapid phagocytosis", "protein p53 deficiency"], "ans": 1, "years": [], "explanation": null}, {"id": "R1_Q4", "num": 4, "q": "Bacteria and viruses cause cell damage by , which is unique from the intracellular damage caused by other injurious agents.", "opts": ["disrupting the sodium/potassium ATPase pump", "interrupting oxidative metabolism processes", "replicating and producing continued injury", "decreasing protein synthesis and function"], "ans": 2, "years": [], "explanation": null}, {"id": "R1_Q5", "num": 5, "q": "The patient has a prolonged interruption in arterial blood flow to his left kidney, causing hypoxic cell injury and the release of free radicals. Free radicals damage cells by:", "opts": ["destroying phospholipids in the cell membrane.", "altering the immune response of the cell.", "disrupting calcium storage in the cell.", "inactivation of enzymes and mitochondria."], "ans": 0, "years": [], "explana ll metabolism resulting from metaplasia", "Dysplasia as a consequence of inflammation during bone remodeling", "Disuse atrophy of muscle cells during a prolonged period of immobility", "Ischemic atrophy resulting from vascular changes while on bedrest"], "ans": 2, "years": [], "explanation": null}, {"id": "R1_Q12", "num": 12, "q": "A 20-year-old college student has presented to her campus medical clinic for a scheduled Papanicolaou (Pap) smear. The clinician who will interpret the smear will examine cell samples for evidence of:", "opts": ["changes in cell shape, size, and organization.", "the presence of unexpected cell types.", "ischemic changes in cell samples.", "abnormally high numbers of cells in a specified field."], "ans": 0, "years": [], "explanation": null}, {"id": "R1_Q13", "num": 13, "q": "Which of the following pathophysiologic processes is most likely to result in metastatic calcification?", "opts": ["Benign prostatic hyperplasia", "Liver cirrhosis", "Impaired glycogen metabolism", "Hyperparathyroidism"], "ans": 3, "years": [], "explanation": null}, {"id": "R1_Q14", "num": 14, "q": "Despite the low levels of radiation used in contemporary radiologic imaging, a radiology technician is aware of the need to minimize her exposure to ionizing radiation. What is the primary rationale for the technicians precautions?", "opts": ["Radiation stimulates pathologic cell hypertrophy and hyperplasia.", "Radiation results in the accumulation of endogenous waste products in the cytoplasm.", "Radiation interferes with DNA synthesis and mitosis.", "Radiation decreases the action potential of rapidly dividing cells."], "ans": 2, "years": [], "explanation": null}, {"id": "R1_Q15", "num": 15, "q": "The parents of a 4-year-old girl have sought care because their daughter has admitted to chewing and swallowing imported toy figurines that have been determined to be made of lead. Which of the following blood tests should the care team prioritize?", "opts": ["White blood cell levels with differential", "Red blood cell levels and morphology", "Urea and creatinine levels", "Liver function panel"], "ans": 1, "years": [], "explanation": null}, {"id": "R1_Q16", "num": 16, "q": "A 70-year-old male patient has been admitted to a hospital for the treatment of a recent hemorrhagic stroke that has left him with numerous motor and sensory deficits. These deficits are most likely the result of which of the following mechanisms of cell injury?", "opts": ["Free radical injury", "Hypoxia and ATP depletion", "Interference with DNA synthesis", "Impaired calcium homeostasis"], "ans": 1, "years": [], "explanation": null}, {"id": "R1_Q17", "num": 17, "q": "Which of the following processes associated with cellular injury is most likely to be reversible?", "opts": ["Cell damage resulting from accumulation of fat in the cytoplasm", "Cellular changes as a result of ionizing radiation", "Cell damage from accumulation of free radicals", "Apoptosis"], "ans": 0, "years": [], "explanation": null}, {"id": "R1_Q18", "num": 18, "q": "The extrinsic pathway of apoptosis can be initiated by:", "opts": ["damage to cellular DNA.", "decreased ATP levels.", "activation of the p53 protein.", "activation of death receptors on the cell surface."], "ans": 3, "years": [], "explanation": null}, {"id": "R1_Q19", "num": 19, "q": "A patient with severe peripheral vascular disease has developed signs of dry gangrene on the great toe of one foot. Which of the following pathophysiologic processes most likely contributed to this diagnosis?", "opts": ["Inappropriate activation of apoptosis", "Bacterial invasion", "Impaired arterial blood supply", "Metaplastic cellular changes"], "ans": 2, "years": [], "explanation": null}, {"id": "R1_Q20", "num": 20, "q": "Which of the following facts underlies the concept of replicative senescence?", "opts": ["Genes controlling longevity are present or absent in varying quantities among different individuals.", "Telomeres become progressively shorter in successive generations of a cell.", "The damaging influence of free radicals increases exponentially in later generations of a cell.", "Aging produces mutations in DNA and deficits in DNA repair."], "ans": 1, "years": [], "explanation": null}]}, {"id": "R2", "title": "Inflammation and Repair", "fullTitle": "Robbins Question Bank – Chapter 2: Inflammation and Repair", "source": "robbins", "questions": [{"id": "R2_Q1", "num": 1, "q": "The characteristic, localized cardinal signs of acute inflammation include:", "opts": ["fever.", "fatigue.", "redness.", "granuloma."], "ans": 2, "years": [], "explanation": null}, {"id": "R2_Q2", "num": 2, "q": "The vascular, hemodynamic stage of acute inflammation is initiated by momentary vasoconstriction followed by vasodilation that causes localized:", "opts": ["bleeding.", "congestion.", "pale skin.", "coolness."], "ans": 1, "years": [], "explanation": null}, {"id": "R2_Q3", "num": 3, "q": "The cellular stage of acute inflammation is marked by the movement of leukocytes into the area. Which of the following cells arrives early in great numbers?", "opts": ["Basophils", "Lymphocytes", "Neutrophils", "Platelets"], "ans": 2, "years": [], "explanation": null}, {"id": "R2_Q4", "num": 4, "q": "The phagocytosis process involves three distinct steps. What is the initial step in the process?", "opts": ["Engulfment", "Intracellular killing", "Antigen margination", "Recognition and adherence"], "ans": 3, "years": [], "explanation": null}, {"id": "R2_Q5", "num": 5, "q": "Which of the following mediators of inflammation causes increased capillary permeability and pain?", "opts": ["Serotonin", "Histamine", "Bradykinin", "Nitric oxide"], "ans": 2, "years": [], "explanation": null}, {"id": "R2_Q6", "num": 6, "q": "Inflammatory exudates are a combination of several types. Which of the following exudates is composed of enmeshed necrotic cells?", "opts": ["Serous", "Fibrinous", "Suppurative", "Membranous"], "ans": 3, "years": [], "explanation": null}, { ": [], "explanation": null}, {"id": "R2_Q17", "num": 17, "q": "Patients are commonly administered antipyretics when their oral temperature exceeds 37.5C (99.5F). Which of the following statements related to the rationale for this action is most accurate?", "opts": ["Temperatures in excess of 37.5C (99.5F) can result in seizure activity.", "Lower temperatures inhibit the protein synthesis of bacteria.", "There is little empirical evidence for this treatment modality.", "Most common antipyretics have been shown to have little effect on core temperature."], "ans": 2, "years": [], "explanation": null}, {"id": "R2_Q18", "num": 18, "q": "A patient has sought care because of recent malaise and high fever. Upon assessment, the patient states that his current fever began two days earlier, although he states that for the last 2 weeks he is in a cycle of high fever for a couple of days followed by a day or two of normal temperature. Which of the following fever patterns is this patient experiencing?", "opts": ["Recurrent fever", "Remittent fever", "Sustained fever", "Intermittent fever"], "ans": 3, "years": [], "explanation": null}, {"id": "R2_Q19", "num": 19, "q": "A febrile, 3-week-old infant has been brought to the emergency department by his parents and is currently undergoing a diagnostic workup to determine the cause of his fever. Which of the following statements best conveys the rationale for this careful examination?", "opts": ["The immature hypothalamus is unable to perform normal thermoregulation.", "Infants are susceptible to serious infections because of their decreased immune function.", "Commonly used antipyretics often have no effect on the core temperature of infants.", "Fever in neonates is often evidence of a congenital disorder rather than an infection."], "ans": 1, "years": [], "explanation": null}, {"id": "R2_Q20", "num": 20, "q": "An 84-year-old patients blood cultures have come back positive, despite the fact that his oral temperature has remained withi tting pathway", "Deactivation of factor X"], "ans": 0, "years": [], "explanation": null}, {"id": "R3_Q13", "num": 13, "q": "A public health nurse is conducting a health promotion campaign under the auspices of the local community center. Which of the following measures that the nurse is promoting are likely to influence the participants risk of hypercoagulability disorders? Select all that apply.", "opts": ["Smoking cessation", "Blood glucose screening", "Weight management", "Cholesterol screening and management", "Blood pressure screening and management"], "ans": [0, 1, 2, 3, 4], "years": [], "explanation": null}, {"id": "R3_Q14", "num": 14, "q": "During a patients admission assessment prior to reduction mammoplasty surgery, the nurse notes a reference to a Leiden mutation in the patients history. The nurse would recognize the patients increased risk for", "opts": ["Hemorrhage", "Myocardial infarction", "Hemophilia A or B", "Deep vein thrombosis"], "ans": 3, "years": [], "explanation": null}, {"id": "R3_Q15", "num": 15, "q": "The most recent blood work of a patient with a diagnosis of acute myelogenous leukemia (AML) reveals thrombocytopenia. Where is the patient most likely to experience abnormal bleeding as a result of low platelets?", "opts": ["In the brain", "Skin and mucous membranes", "Sclerae of the eyes", "Nephrons and ureters"], "ans": 1, "years": [], "explanation": null}, {"id": "R3_Q16", "num": 16, "q": "A patient was started on a protocol for the prevention of deep vein thrombosis shortly after admission, and has been receiving 5000 units of heparin twice daily for the last 5 days. An immune response to this treatment may increase the patients chance of developing which health problem?", "opts": ["Antiphospholipid syndrome", "Disseminated intravascular coagulation (DIC)", "Von Willebrand disease", "Thrombocytopenia"], "ans": 3, "years": [], "explanation": null}, {"id": "R3_Q17", "num": 17, "q": "In light of the presence of numerous risk factors for coronary artery disease, a patients primary care provider has recommended that he take low-dose aspirin once daily. Doing so will reduce the patients risk of myocardial infarction by altering which of the following stages of hemostasis?", "opts": ["Vessel spasm", "Platelet plug formation", "Blood coagulation", "Clot lysis"], "ans": 1, "years": [], "explanation": null}, {"id": "R3_Q18", "num": 18, "q": "A 23-year-old female patient has been diagnosed with von Willebrand disease following a long history of heavy periods and occasional nosebleeds. Which of the patients following statements demonstrates a sound understanding of her new diagnosis?", "opts": ["Im really disappointed that I wont be able to do sports anymore.", "I read on a website that I might have to get blood transfusions from time to time.", "Ill make sure to take Tylenol instead of aspirin when I get aches and pains.", "I hope my insurance covers the injections that Ill need to help my blood clot."], "ans": 2, "years": [], "explanation": null}, {"id": "R3_Q19", "num": 19, "q": "Which of the following patients likely faces the highest risk of an acquired hypocoagulation disorder and vitamin K deficiency?", "opts": ["A patient who has a diagnosis of liver failure secondary to alcohol abuse", "A patient who has chronic renal failure as a result of type 1 diabetes mellitus", "A patient who is immunocompromised as a result of radiation therapy for the treatment of lung cancer", "A patient with dehydration and hypokalemia that have resulted from Clostridium difficileassociated diarrhea"], "ans": 0, "years": [], "explanation": null}, {"id": "R3_Q20", "num": 20, "q": "A healthy, primiparous (first-time) mother delivered a healthy infant several hours ago, but the mother has experienced postpartum hemorrhage. Which of the following disorders is most likely to underlie the patients excessive bleeding after delivery?", "opts": ["Disseminated intravascular coagulation", "Hemophilia A", "Von Willebrand disease", "Thrombotic thrombocytopenic purpura (TTP)"], "ans": 0, "years": [], "explanation": null}]}, {"id": "R4", "title": "Genetic and Pediatric Diseases", "fullTitle": "Robbins Question Bank – Chapter 4: Genetic and Pediatric Diseases", "source": "robbins", "questions": [{"id": "R4_Q1", "num": 1, "q": "Genetic disorders that involve a single gene trait are characterized by:", "opts": ["multifactorial gene mutations.", "chromosome rearrangements.", "Mendelian patterns of transmission.", "abnormal numbers of chromosomes."], "ans": 2, "years": [], "explanation": null}, {"id": "R4_Q2", "num": 2, "q": "In addition to having a 50% chance of inheriting an autosomal dominant disorder from an affected parent, such a disorder is characterized by:", "opts": ["aneuploidy of genes in all cells.", "deficiencies in enzyme synthesis.", "affected X transmission to daughters.", "varied gene penetration and expression."], "ans": 3, "years": [], "explanation": null}, {"id": "R4_Q3", "num": 3, "q": "Autosomal recessive disorders are characterized by:", "opts": ["age of onset later in life.", "abnormal protein structure.", "inborn errors of metabolism.", "one in two risk of a carrier child."], "ans": 2, "years": [], "explanation": null}, {"id": "R4_Q4", "num": 4, "q": "When a male child inherits an X-linked disorder from his heterozygous carrier mother,", "opts": ["his sons will be carriers.", "his father has the disorder.", "some of his sisters will be carriers.", "his daughters will have the disorder."], "ans": 2, "years": [], "explanation": null}, {"id": "R4_Q5", "num": 5, "q": "Multifactorial inheritance disorders, such as cleft palate, are often caused by during fetal development.", "opts": ["multiple gene mutations", "dominant gene expression", "X-linked crossover problem", "polyploidy of chromosomes"], "ans": 0, "years": [], "explanation": null}, {"id": "R4_Q6", "num": 6, "q": "The newborn has the distinctive physical features of trisomy 21, Down syndrome, which includes:", "opts": ["upward slanting of eyes.", "large, protruding ears.", "thin lips and small tongue.", "long fingers with extra creases."], "ans": 0, "years": [], "explanation": null}, {"id": "R4_Q7", "num": 7, "q": "Aneuploidy of the X chromosome can result in a monosomy or polysomy disorder. The manifestations of monosomy X, Turner syndrome, differ from polysomy X disorders in numerous ways that include:", "opts": ["short-stature female individual..", "mental retardation.", "enlarged breasts.", "early onset puberty."], "ans": 0, "years": [], "explanation": null}, {"id": "R4_Q8", "num": 8, "q": "A teratogenic environmental agent can cause birth defects when:", "opts": ["inherited as a recessive trait.", "intense exposure occurs at birth.", "disjunction occurs during meiosis.", "retained during early pregnancy."], "ans": 3, "years": [], "explanation": null}, {"id": "R4_Q9", "num": 9, "q": "Fetal alcohol syndrome (FAS) is unlike other teratogens in that the harmful effects on the fetus:", "opts": ["directly result in liver damage.", "extend throughout the pregnancy.", "is most noticeable in adulthood.", "cause death in early childhood."], "ans": 1, "years": [], "explanation": null}, {"id": "R4_Q10", "num": 10, "q": "Prenatal diagnosis methods include the use of ultrasonography for identifying abnormalities.", "opts": ["cytogenic", "skeletal", "chromosomal", "a-fetoprotein"], "ans": 1, "years": [], "explanation": null}, {"id": "R4_Q11", "num": 11, "q": "A woman who is a carrier for which of the following diseases possesses the greatest likelihood of passing the disease to her future children when heterozygous pairing exists?", "opts": ["Phenylketonuria (PKU)", "Tay-Sachs disease", "Neurofibromatosis", "Cystic fibrosis"], "ans": 2, "years": [], "explanation": null}, {"id": "R4_Q12", "num": 12, "q": "Which of the following statements is true of autosomal recessive disorders?", "opts": ["Onset is typically late in childhood or early in adulthood.", "Symptomatology is less uniform than with autosomal dominant disorders.", "Mitochondrial DNA is normally the site of genetic alteration.", "Effects are typically the result of alterations in enzyme function."], "ans": 3, "years": [], "explanation": null}, {"id": "R4_Q13", "num": 13, "q": "The parents of a newborn infant are relieved that their baby was born healthy, with the exception of a cleft lip that will be surgically corrected in 10 or 12 weeks. Which of the nurses following statements to the parents best conveys the probable cause of the infants cleft lip?", "opts": ["Though you are both healthy, you likely both carry the gene for a cleft lip.", "Provided one of you had the gene for a cleft lip, your baby likely faced a 50/50 chance of having one.", "Your childs cleft lip likely results from the interplay between environment and genes.", "A cleft lip can sometimes result from taking prescription drugs, even when theyre taken as ordered."], "ans": 2, "years": [], "explanation": null}, {"id": "R4_Q14", "num": 14, "q": "Which of the following practitioners is most likely to be of assistance in the early care of an infant with a cleft lip?", "opts": ["Lactation consultant", "Respiratory therapist", "Occupational therapist", "Social worker"], "ans": 0, "years": [], "explanation": null}, {"id": "R4_Q15", "num": 15, "q": "A 41-year-old woman has made the recent decision to start a family, and is eager to undergo testing to mitigate the possibility of having a child with Down syndrome. Which of the following tests is most likely to provide the data the woman seeks?", "opts": ["Genetic testing of the woman", "Genetic testing of the woman and the father", "Prenatal blood tests", "Ultrasonography"], "ans": 2, "years": [], "explanation": null}, {"id": "R4_Q16", "num": 16, "q": "Genetic testing has revealed that a male infant has been born with an extra X chromosome. What are the most likely implications of this finding?", "opts": ["The child is unlikely to survive infancy", "The child is likely to have no manifestations of this chromosomal abnormality", "The child will have significant neurological and cognitive defects", "The child will be unable to reproduce"], "ans": 1, "years": [], "explanation": null}, {"id": "R4_Q17", "num": 17, "q": "Which of the following variables determine the extent of teratogenic drug effects? Select all that apply.", "opts": ["Maternal health history", "Molecular weight of the drug", "Stage of pregnancy when the drug was taken", "Duration of drug exposure", "Fetal blood type"], "ans": [1, 2, 3], "years": [], "explanation": null}, {"id": "R4_Q18", "num": 18, "q": "A woman who has just learned that she is pregnant for the first time has sought advice from her healthcare provider about the safe use of alcohol during pregnancy. What advice should the clinician provide to the woman?", "opts": ["Its likely best to eliminate alcohol from your diet while youre pregnant.", "Moderation in alcohol use is critical while you are pregnant.", "You should limit yourself to a maximum of one drink daily while youre pregnant.", "You should drink no alcohol until you are in your second trimester."], "ans": 0, "years": [], "explanation": null}, {"id": "R4_Q19", "num": 19, "q": "Which of the following health problems may be identified by a TORCH screening test?", "opts": ["Rubella and herpes", "Tenovaginitis and human papillomavirus", "Rhinovirus and Ormond disease", "Chlamydia and rickets"], "ans": 0, "years": [], "explanation": null}, {"id": "R4_Q20", "num": 20, "q": "Ultrasonography is most likely to detect which of the following fetal abnormalities?", "opts": ["Neural tube defects", "Skeletal abnormalities", "Chromosomal defects", "Single-gene disorders"], "ans": 1, "years": [], "explanation": null}]}, {"id": "R5", "title": "Diseases of the Immune System", "fullTitle": "Robbins Question Bank – Chapter 5: Diseases of the Immune System", "source": "robbins", "questions": [{"id": "R5_Q1", "num": 1, "q": "The mediators involved in type I hypersensitivity allergic responses are released from:", "opts": ["mast cells.", "plasma cells.", "monocytes.", "arachidonic acid."], "ans": 0, "years": [], "explanation": null}, {"id": "R5_Q2", "num": 2, "q": "A genetically determined hypersensitivity to common environmental allergens causes reactions, such as:", "opts": ["atopic; urticaria.", "autoimmune; diarrhea.", "IgM-mediated; infections.", "delayed; poison ivy rash:"], "ans": 0, "years": [], "explanation": null}, {"id": "R5_Q3", "num": 3, "q": "Mismatched blood transfusion reaction with hemolysis of blood cells is an example of type II, mediated hypersensitivity reaction.", "opts": ["T-cell", "antibody", "leukotriene", "complement"], "ans": 1, "years": [], "explanation": null}, {"id": "R5_Q4", "num": 4, "q": "Type III hypersensitivity immune responses can be harmful when immune complex deposits in tissue activate that can directly damage area tissues.", "opts": ["inflammation", "autoantibodies", "cytotoxic cells", "immunoglobulins"], "ans": 0, "years": [], "explanation": null}, {"id": "R5_Q5", "num": 5, "q": "The mechanism by which humans recognize self-cells from non-self (antigens)-cells is .", "opts": ["autoimmunity", "self-tolerance", "non-self anergy", "immunocompatibility"], "ans": 1, "years": [], "explanation": null}, {"id": "R5_Q6", "num": 6, "q": "Organ rejection is a complication of organ transplantation caused by recipient immune cells:", "opts": ["destroying the host T cells.", "attack on the donor cells.", "combining with grafts HLA.", "being recognized as foreign."], "ans": 1, "years": [], "explanation": null}, {"id": "R5_Q7", "num": 7, "q": "The leading cause of death for people with HIV is opportunistic .", "opts": ["leukemia", "tuberculosis", "pneumonia", "toxoplasmosis"], "ans": 1, "years": [], "explanation": null}, {"id": "R5_Q8", "num": 8, "q": "Wasting syndrome, an AIDS-defining illness, is characterized by involuntary weight loss of at least 10% of baseline body weight in the presence of:", "opts": ["diarrhea.", "hypermetabolism.", "weakness and fever.", "glucose intolerance."], "ans": 0, "years": [], "explanation": null}, {"id": "R5_Q9", "num": 9, "q": "The window period of HIV infection refers to the period of time between infection and:", "opts": ["transmission.", "seroconversion.", "initial symptoms.", "antibody screening."], "ans": 1, "years": [], "explanation": null}, {"id": "R5_Q10", "num": 10, "q": "HIV-positive persons that display manifestations of laboratory category 3 or clinical category C are considered to have:", "opts": ["zero viral load.", "seroconversion.", "complete remission.", "AIDS-defining illnesses."], "ans": 3, "years": [], "explanation": null}, {"id": "R5_Q11", "num": 11, "q": "Contact with poison ivy has resulted in intense pruritus, erythema, and weeping on a patients forearm. Which of the following processes resulted in the patients signs and symptoms?", "opts": ["IgE-mediated mast cell degranulation", "Formation of antigen-antibody complexes", "Cytokine release by sensitized T cells", "Formation of antibodies against cell surface antigens"], "ans": 2, "years": [], "explanation": null}, {"id": "R5_Q12", "num": 12, "q": "A patient with a long history of hay fever has recently begun a series of immunotherapy (allergy shots). How will this treatment potentially achieve a therapeutic effect?", "opts": ["By blocking cytokine release from sensitized mast cells", "By preventing mast cells from becoming sensitized", "By causing T cells to be sequestered in the thymus for longer periods", "By stimulating production of IgG to combine with antigens"], "ans": 3, "years": [], "explanation": null}, {"id": "R5_Q13", "num": 13, "q": "A patient with a diagnosis of cirrhosis has experienced an acute rejection of a donor liver. Which of the following cells is central to the rejection of the patients transplanted organ?", "opts": ["Natural killer cells", "Mast cells", "T cells", "Neutrophils"], "ans": 2, "years": [], "explanation": null}, {"id": "R5_Q14", "num": 14, "q": "A patient with a diagnosis of aplastic anemia has undergone allogenic bone marrow transplantation. Which of the following signs and symptoms would most clearly suggest the existence of graft-versus-host disease (GVHD)?", "opts": ["Shortness of breath, audible crackles, and decreasing PaO2", "Presence of a pruritic rash that has begun to slough off", "Development of metabolic acidosis", "Diaphoresis, fever, and anxiety"], "ans": 1, "years": [], "explanation": null}, {"id": "R5_Q15", "num": 15, "q": "A patient has developed pericarditis after developing acute glomerulonephritis, a development that may be attributable to the presence of similar epitopes on group A, b-hemolytic streptococci and the antigens in the patients heart tissue. Which of the following has most likely accounted for this patients autoimmune response?", "opts": ["Breakdown of T-cell anergy", "Release of sequestered antigens", "Superantigens", "Molecular mimicry"], "ans": 3, "years": [], "explanation": null}, {"id": "R5_Q16", "num": 16, "q": "A 70-year-old female patient has had her mobility and independence significantly reduced by rheumatoid arthritis. Which of the following processes likely contributed to the development of her health problem?", "opts": ["Delayed-type hypersensitivity (DTH) reaction", "Proliferation of cytotoxic T cells", "Failure of normal self-tolerance", "Deletion of autoreactive B cells"], "ans": 2, "years": [], "explanation": null}, {"id": "R5_Q17", "num": 17, "q": "Which of the following would constitute a normal assessment finding in a neonate?", "opts": ["Minimal or absent levels of IgA and IgM", "Absence of plasma cells in the lymph nodes and spleen", "Undetectable levels of all immunoglobulins", "Absence of mature B cells with normal T- cell levels and function"], "ans": 0, "years": [], "explanation": null}, {"id": "R5_Q18", "num": 18, "q": "A patient was diagnosed as HIV positive several years ago. Which of the following blood tests is most clinically useful for determining the stage and severity of her disease?", "opts": ["Plasma levels", "CD4+ cell counts", "Viral load", "White blood cell count with differential"], "ans": 1, "years": [], "explanation": null}, {"id": "R5_Q19", "num": 19, "q": "A patient has been admitted to the hospital for the treatment of HIV infection, which has recently progressed to overt AIDS. Which of the following nursing actions should the nurse prioritize when providing care for this patient?", "opts": ["Frequent neurologic vital signs and thorough skin care", "Hemodynamic monitoring and physical therapy", "Careful monitoring of fluid balance and neurologic status", "Astute infection control and respiratory assessments"], "ans": 3, "years": [], "explanation": null}, {"id": "R5_Q20", "num": 20, "q": "Shortly after being diagnosed with HIV, a patient has begun highly active antiretroviral therapy (HAART). What is the primary goal of the patients drug regimen?", "opts": ["To limit the latent period of HIV", "To slow the progression of the disease", "To minimize opportunities for transmission", "To prevent seroconversion"], "ans": 1, "years": [], "explanation": null}]}, {"id": "R6", "title": "Neoplasia", "fullTitle": "Robbins Question Bank – Chapter 6: Neoplasia", "source": "robbins", "questions": [{"id": "R6_Q1", "num": 1, "q": "Unlike the tissue growth that occurs with hypertrophy and hyperplasia, the growth of a malignancy is:", "opts": ["adaptive.", "specialized.", "predictable.", "autonomous."], "ans": 3, "years": [], "explanation": null}, {"id": "R6_Q2", "num": 2, "q": "In contrast to malignancies, benign tumors are characterized by:", "opts": ["a fibrous capsule.", "distant infiltration.", "rapid replication.", "undifferentiated cells."], "ans": 0, "years": [], "explanation": null}, {"id": "R6_Q3", "num": 3, "q": "Because of their rapid growth, malignant tumors affect area tissues by:", "opts": ["increasing tissue blood flow.", "providing essential nutrients.", "liberating enzymes and toxins.", "forming fibrous membranes."], "ans": 2, "years": [], "explanation": null}, {"id": "R6_Q4", "num": 4, "q": "The metastatic spread of tumor cells is facilitated by that enables invasion and movement to distant tissues.", "opts": ["cell cohesiveness", "enzyme secretion", "contact inhibition", "cell-to-cell signaling"], "ans": 1, "years": [], "explanation": null}, {"id": "R6_Q5", "num": 5, "q": "The angiogenesis process, which allows tumors to develop new blood vessels, is triggered and regulated by tumor- secreted:", "opts": ["procoagulants.", "growth factors.", "attachment factors.", "proteolytic enzymes."], "ans": 1, "years": [], "explanation": null}, {"id": "R6_Q6", "num": 6, "q": "Cancerous transformation of a cell requires the activation of:", "opts": ["cell cycle apoptosis.", "multiple mutations.", "a single gene mutation.", "tumor suppressor genes."], "ans": 1, "years": [], "explanation": null}, {"id": "R6_Q7", "num": 7, "q": "Although clinical manifestations vary with the type of cancer and organs involved, abnormal tumor growth causes general manifestations that include:", "opts": ["copious lymph flow.", "sleep disturbances.", "involuntary weight gain.", "visceral organ expansion."], "ans": 1, "years": [], "explanation": null}, {"id": "R6_Q8", "num": 8, "q": "Paraneoplastic syndromes are manifestations of cancer that often result from:", "opts": ["radiation and chemotherapy.", "compression of area vessels.", "tumor-related tissue necrosis.", "inappropriate hormone release."], "ans": 3, "years": [], "explanation": null}, {"id": "R6_Q9", "num": 9, "q": "Although both grading and staging are methods for classifying cancer and selecting a treatment plan, staging is used to determine the:", "opts": ["number of mitoses.", "tissue characteristics.", "level of differentiation.", "extent of disease spread."], "ans": 3, "years": [], "explanation": null}, {"id": "R6_Q10", "num": 10, "q": "Early diagnosis of childhood cancers is often difficult because the signs and symptoms are:", "opts": ["already present at birth.", "absent until the late stage.", "similar to those of other childhood diseases.", "seen as developmental delays."], "ans": 2, "years": [], "explanation": null}, {"id": "R6_Q11", "num": 11, "q": "A lung biopsy and magnetic resonance imaging have confirmed the presence of a benign lung tumor in a patient. Which of the following characteristics are associated with this patients neoplasm?", "opts": ["The tumor will grow by expansion and is likely encapsulated.", "The cells that constitute the tumor are undifferentiated, with atypical structure.", "If left untreated, the patients tumor is likely to metastasize.", "The tumor is likely to infiltrate the lung tissue that presently surrounds it."], "ans": 0, "years": [], "explanation": null}, {"id": "R6_Q12", "num": 12, "q": "Which of the following processes characterizes an epigenetic contribution to oncogenesis?", "opts": ["A DNA repair mechanism is disrupted.", "A tumor suppressor gene is present, but it is not expressed.", "Cells lose their normal contact inhibition.", "Regulation of apoptosis in impaired, resulting in accumulation of cancer cells."], "ans": 1, "years": [], "explanation": null}, {"id": "R6_Q13", "num": 13, "q": "A farmers long-term exposure to pesticides has made the cells in his alveoli and bronchial tree susceptible to malignancy. Which of the following processes has taken place in the farmers lungs?", "opts": ["Promotion", "Progression", "Initiation", "Differentiation"], "ans": 2, "years": [], "explanation": null}, {"id": "R6_Q14", "num": 14, "q": "Genetic screening may be indicated for individuals who have a family history of which of the following neoplasms?", "opts": ["Liver cancer", "Multiple myeloma", "Leukemia", "Breast cancer"], "ans": 3, "years": [], "explanation": null}, {"id": "R6_Q15", "num": 15, "q": "A public health nurse has cited a reduction in cancer risk among the many benefits of maintaining a healthy body-mass index. Which of the following facts underlies the relationship between obesity and cancer?", "opts": ["Obesity can cause inflammation and hormonal changes that are associated with cancer.", "Adipose tissue is more susceptible to malignancy than other types of connective tissue.", "Increased cardiac workload and tissue hypoxia can interfere with normal cell differentiation.", "Increased numbers of body cells increase the statistical chances of neoplastic cell changes."], "ans": 0, "years": [], "explanation": null}, {"id": "R6_Q16", "num": 16, "q": "Which of the following dietary guidelines should a nurse provide to a group of older adults to possibly decrease their risks of developing colon cancer?", "opts": ["As much as possible, try to eat organic foods.", "Regular vitamin supplements and a low- carbohydrate diet are beneficial.", "Try to minimize fat and maximize fiber when youre planning your meals.", "Eat enough fiber in your diet that you have bowel movement at least once daily."], "ans": 2, "years": [], "explanation": null}, {"id": "R6_Q17", "num": 17, "q": "A male patient with a diagnosis of liver cancer has been recently admitted to a palliative care unit following his recent development of bone metastases. Despite his familys encouragement, the patient has experienced precipitous weight loss in recent weeks. Which of the following factors may underlie the patients loss of fat and muscle mass?", "opts": ["The action of cytokines and consequent inflammation", "Loss of appetite due to fatigue and pain", "Changes in peptide hormone levels", "Production of onconeural antigens by cancerous cells"], "ans": 0, "years": [], "explanation": null}, {"id": "R6_Q18", "num": 18, "q": "A 51-year-old patient has been diagnosed with stage IV breast cancer with lung metastases. Which of the following treatment options is most likely to treat both her primary and distant cancer sites?", "opts": ["Radiation therapy", "Chemotherapy", "Surgery", "Hormone therapy"], "ans": 1, "years": [], "explanation": null}, {"id": "R6_Q19", "num": 19, "q": "A patients oncologist has presented the possibility of implementing biotherapy in the treatment of the patients brain tumor. Which of the following mechanisms of action provide the therapeutic effects of biotherapy? Select all that apply.", "opts": ["Stimulating the immune response to tumor cells", "Inhibiting tumor protein synthesis", "Reversing angiogenesis", "Altering the hormonal environment of tumor cells", "Causing breaks in the DNA of tumor cells"], "ans": [0, 1], "years": [], "explanation": null}, {"id": "R6_Q20", "num": 20, "q": "A 5-year-old girls diagnosis of bone cancer required an aggressive treatment regimen. Which of the following considerations forms the most significant threat to her future health?", "opts": ["Retention of chemotherapeutic drugs in the healthy bone matrix", "Unwanted effects of chemotherapy and radiation therapy", "Resistance to chemotherapy and radiation if required later in life", "Risk for recurrence of the primary neoplasm after puberty"], "ans": 1, "years": [], "explanation": null}]}, {"id": "R7", "title": "Environmental and Nutritional Diseases", "fullTitle": "Robbins Question Bank – Chapter 7: Environmental and Nutritional Diseases", "source": "robbins", "questions": [{"id": "R7_Q1", "num": 1, "q": "The adipocytes in adipose tissue not only serve as a storage sites, they also:", "opts": ["produce linoleic fatty acid.", "synthesize triglycerides.", "increase glucagon release.", "degrade fat-soluble vitamins."], "ans": 1, "years": [], "explanation": null}, {"id": "R7_Q2", "num": 2, "q": "Protein contains nitrogen. A negative nitrogen balance represents:", "opts": ["more protein consumed than excreted.", "a reduced need for nitrogen as protein.", "more nitrogen excreted than consumed.", "less use of nitrogen for protein synthesis."], "ans": 2, "years": [], "explanation": null}, {"id": "R7_Q3", "num": 3, "q": "Natural appetite suppression mechanisms, necessary for food intake control, include :", "opts": ["ketoacid deficiency.", "cholecystokinin storage.", "decreased blood glucose.", "leptin receptor stimulation."], "ans": 3, "years": [], "explanation": null}, {"id": "R7_Q4", "num": 4, "q": "Body weight should be used in combination with other measurements to establish if a person is underweight or overweight. Obesity is indicated by:", "opts": ["female body fat of 20% and 30%.", "body mass index (BMI) of 30 to 40.", "relative body weight of 70% to 100%.", "abdominal fat/ hip ratio of 0.8 to 1.0."], "ans": 1, "years": [], "explanation": null}, {"id": "R7_Q5", "num": 5, "q": "A patient with upper body obesity also has central fat distribution. This body fat configuration places the patient at greater risk for than a patient with lower body obesity.", "opts": ["osteoporosis", "renal disease", "cardiometabolic disorders", "chronic anemia"], "ans": 2, "years": [], "explanation": null}, {"id": "R7_Q6", "num": 6, "q": "As the problem of childhood and adolescent obesity increases, an increase in the incidence of is occurring in this obese population.", "opts": ["type 2 diabetes mellitus", "attention deficit disorder", "juvenile rheumatoid arthritis", "antibiotic-resistant bacterial infections"], "ans": 0, "years": [], "explanation": null}, {"id": "R7_Q7", "num": 7, "q": "A diet deficient in calories and protein causes marasmus, which is characterized by:", "opts": ["discolored hair.", "bradycardia.", "enlarged liver.", "pitting edema."], "ans": 1, "years": [], "explanation": null}, {"id": "R7_Q8", "num": 8, "q": "Protein-calorie malnutrition with loss of lean tissues and muscle mass results in:", "opts": ["respiratory muscle stimulation.", "excessive blood cell production.", "diarrhea.", "increased cardiac contractility."], "ans": 2, "years": [], "explanation": null}, {"id": "R7_Q9", "num": 9, "q": "Similarities between girls or women with anorexia nervosa and bulimia nervosa include:", "opts": ["periodontal disease.", "low estrogen level.", "electrolyte imbalances.", "enlarged parotid gland."], "ans": 2, "years": [], "explanation": null}, {"id": "R7_Q10", "num": 10, "q": "Both binge-eating and bulimia nervosa patients consume excessive amounts of foods secretively. A major difference is that binge-eaters:", "opts": ["remain overweight.", "eat when not hungry.", "are substance abusers.", "experience depression."], "ans": 0, "years": [], "explanation": null}, {"id": "R7_Q11", "num": 11, "q": "A large, high-calorie meal has resulted in the intake of far more energy than a person requires. What will the individuals body do with the excess carbohydrates provided by this meal?", "opts": ["Convert them into glucose and store them in the liver and muscles", "Excrete most of the excess polysaccharides through the kidneys", "Convert the carbohydrates into amino acids in preparation for long-term storage", "Create structural proteins from some of the carbohydrates and store the remainder as triglycerides"], "ans": 0, "years": [], "explanation": null}, {"id": "R7_Q12", "num": 12, "q": "Which of the following patients is most likely to be in positive nitrogen balance?", "opts": ["A patient who is receiving treatment for sepsis", "A patient whose diagnosis of pneumonia is causing a fever", "A woman who has been admitted to the hospital in early labor", "A patient who sustained extensive burns in a recent industrial accident"], "ans": 2, "years": [], "explanation": null}, {"id": "R7_Q13", "num": 13, "q": "In addition to facilitating bowel movements, a diet that is high in fiber confers which of the following benefits?", "opts": ["Lowering cholesterol and blood glucose", "Removing toxins and metabolic byproducts", "Lowering blood pressure and resting heart rate", "Increasing intestinal absorption of vitamins and minerals"], "ans": 0, "years": [], "explanation": null}, {"id": "R7_Q14", "num": 14, "q": "Which of the following statements best conveys the endocrine function of adipose tissue?", "opts": ["Adipose tissue antagonizes the eff unds before the end of this year."], "ans": 2, "years": [], "explanation": null}, {"id": "R8_Q12", "num": 12, "q": "A patient with a diagnosis of chronic renal failure secondary to diabetes has seen a gradual increase in her blood pressure over the past several months, culminating in a diagnosis of secondary hypertension. Which of the following has most likely resulted in the patients increased blood pressure?", "opts": ["Increased levels of adrenocortical hormones", "Activation of the renin-angiotensin- aldosterone mechanism", "Increased sympathetic stimulation by the autonomic nervous system (ANS)", "Coarctation of the patients aorta"], "ans": 1, "years": [], "explanation": null}, {"id": "R8_Q13", "num": 13, "q": "Which of the following physiologic processes contributes most to the long-term regulation of blood pressure?", "opts": ["Actions of the renin-angiotensin-aldosterone system", "Release of antidiuretic hormone (vasopressin) by the posterior pituitary", "Renal monitoring and adjustment of extracellular fluid volume", "Integration and modulation of autonomic nervous system (ANS)"], "ans": 2, "years": [], "explanation": null}, {"id": "R8_Q14", "num": 14, "q": "Which of the following is a nonmodifiable risk factor for the development of primary hypertension?", "opts": ["African American race", "High salt intake", "Male gender", "Obesity"], "ans": 0, "years": [], "explanation": null}, {"id": "R8_Q15", "num": 15, "q": "A patient with persistent, primary hypertension remains apathetic about his high blood pressure, stating, I dont feel sick, and it doesnt seem to be causing me any problems that I can tell. How could a clinician best respond to this patients statement?", "opts": ["Actually, high blood pressure makes you very susceptible to getting diabetes in the future.", "Thats true, but its an indicator that youre not taking very good care of yourself.", "You may not sense any problems, but it really increases your risk of heart disease and stroke.", "Youre right, but its still worthwhile to monitor it in case you do develop problems."], "ans": 2, "years": [], "explanation": null}, {"id": "R8_Q16", "num": 16, "q": "A patients primary care provider has added 20 mg of Lasix (furosemide) to his medication regimen to treat his primary hypertension. How does this diuretic achieve its therapeutic effect?", "opts": ["By decreasing vascular volume by increasing sodium and water excretion", "By blocking the release of antidiuretic hormone from the posterior pituitary", "By inhibiting the conversion of angiotensin I to angiotensin II.", "By inhibiting the movement of calcium into arterial smooth muscle cells"], "ans": 0, "years": [], "explanation": null}, {"id": "R8_Q17", "num": 17, "q": "A 29-year-old woman who considers herself active and health conscious is surprised to have been diagnosed with preeclampsia-eclampsia in her second trimester. What should her care provider teach her about this change in her health status?", "opts": ["We dont really understand why some women get high blood pressure when theyre pregnant.", "This is likely a result of your nervous system getting overstimulated by pregnancy.", "Hypertension is a common result of all the hormonal changes that happen during pregnancy.", "Even though youre a healthy person, it could be that you have an underlying heart condition."], "ans": 0, "years": [], "explanation": null}, {"id": "R8_Q18", "num": 18, "q": "Which of the following patients should most likely be assessed for orthostatic hypotension?", "opts": ["A 78-year-old woman who has begun complaining of frequent headaches unrelieved by over-the-counter analgesics.", "A patient whose vision has become much less acute in recent months and who has noticed swelling in her ankles.", "An elderly patient who has experienced two falls since admission while attempting to ambulate to the bathroom.", "A patient who has a history of poorly controlled type 1 diabetes."], "ans": 2, "years": [], "explanation": null}, {"id": "R8_ ens; stretches", "contracts; friction rubs", "fills rapidly; compresses"], "ans": 3, "years": [], "explanation": null}, {"id": "R9_Q4", "num": 4, "q": "In adults, sudden death from an acute myocardial infarction is usually caused by:", "opts": ["acute myocarditis.", "high troponin levels.", "acute ventricular arrhythmia.", "hypertrophic cardiomyopathy."], "ans": 2, "years": [], "explanation": null}, {"id": "R9_Q5", "num": 5, "q": "On the second or third day after an acute myocardial infarction, the area of necrosis is:", "opts": ["soft and yellow.", "acutely inflamed.", "granulation tissue.", "fibrous scar tissue."], "ans": 1, "years": [], "explanation": null}, {"id": "R9_Q6", "num": 6, "q": "In aortic regurgitation, failure of aortic valve closure during diastole causes an abnormal drop in diastolic pressure. This change in pressure causes decreased:", "opts": ["stroke volume.", "left ventricular size.", "coronary perfusion.", "arterial pulse pressure."], "ans": 2, "years": [], "explanation": null}, {"id": "R9_Q7", "num": 7, "q": "Patients with ischemic coronary vessel disease and acute coronary syndrome (ACS) are classified as low or high risk for acute myocardial infarction based on characteristics that include significant:", "opts": ["heart murmurs.", "ECG changes.", "pulmonary disease.", "pericardial effusion."], "ans": 1, "years": [], "explanation": null}, {"id": "R9_Q8", "num": 8, "q": "Dilated cardiomyopathy with left ventricular dysfunction is characterized by increased wall:", "opts": ["rigidity.", "thinning.", "thickness.", "contractility."], "ans": 1, "years": [], "explanation": null}, {"id": "R9_Q9", "num": 9, "q": "Endocarditis and rheumatic heart disease are both cardiac complications of systemic infections. Characteristics include a new or changed heart murmur caused by:", "opts": ["chronic atrial fibrillation.", "myocardial inflammation.", "left ventricle hypertrophy.", "vegetative valve destruction."], "ans": 3, "years": [], "explanation": null}, {
