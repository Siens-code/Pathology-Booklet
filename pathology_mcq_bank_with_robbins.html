ensating for increasing intracranial pressure is the:", "opts": ["brain cell tissue.", "intravascular blood.", "surface sulci fluid.", "cerebrospinal fluid."], "ans": 3, "years": [], "explanation": null}, {"id": "R21_Q2", "num": 2, "q": "A late indicator of increased intracranial pressure is:", "opts": ["tachycardia.", "right-sided heart failure.", "narrow pulse pressure.", "high mean arterial pressure."], "ans": 3, "years": [], "explanation": null}, {"id": "R21_Q3", "num": 3, "q": "Extreme cerebral edema may cause the brain to herniate into another compartment. Upward herniation from the infratentorial compartment against the aqueduct of Sylvius causes:", "opts": ["hydrocephalus.", "cardiac arrest.", "tissue infarction.", "intracranial bleeding."], "ans": 0, "years": [], "explanation": null}, {"id": "R21_Q4", "num": 4, "q": "Coup and contrecoup cerebral contusion caused by blunt head trauma against a fixed object results in:", "opts": ["diffuse axonal injuries.", "cerebrovascular infarction.", "momentary unconsciousness.", "permanent brain tissue damage."], "ans": 3, "years": [], "explanation": null}, {"id": "R21_Q5", "num": 5, "q": "An intracranial epidural hematoma causes focal symptoms that can include:", "opts": ["ipsilateral pupil dilation.", "ipsilateral hemiparesis.", "diffuse venous bleeding.", "commuting hydrocephalus."], "ans": 0, "years": [], "explanation": null}, {"id": "R21_Q6", "num": 6, "q": "The earliest signs of decreased level of consciousness include:", "opts": ["stupor.", "lethargy.", "delirium.", "inattention."], "ans": 3, "years": [], "explanation": null}, {"id": "R21_Q7", "num": 7, "q": "Metabolic factors that increase cerebral blood flow include:", "opts": ["increased oxygen saturation.", "increased carbon dioxide level.", "decreased serum sodium level.", "decreased hydrogen ion concentration."], "ans": 1, "years": [], "explanation": null}, {"id": "R21_Q8", "num": 8, "q": "Transient ischemic attacks (TIAs) are characterized by ischemic cerebral neurologic deficits that:", "opts": ["indicate aneurysm leakage.", "cause minor residual deficits.", "affect diffuse cerebral functions.", "resolve within one hour of onset."], "ans": 3, "years": [], "explanation": null}, {"id": "R21_Q9", "num": 9, "q": "Common manifestations of acute meningococcal meningitis, a highly contagious and lethal form of meningitis, include:", "opts": ["diplopia.", "petechiae.", "papilledema.", "focal paralysis."], "ans": 1, "years": [], "explanation": null}, {"id": "R21_Q10", "num": 10, "q": "The moderate stage of the progressive degenerative Alzheimer-type dementia is manifested by behaviors that include:", "opts": ["confusion.", "incontinence.", "decreased level of consciousness.", "social withdrawal."], "ans": 0, "years": [], "explanation": null}, {"id": "R21_Q11", "num": 11, "q": "A patients recent computed tomography (CT) scan has revealed the presence of hydrocephalus. Which of the following treatment measures is most likely to resolve this health problem?", "opts": ["Aggressive diuresis", "Placement of a shunt", "Administration of hypertonic intravenous solution", "Lumbar puncture"], "ans": 1, "years": [], "explanation": null}, {"id": "R21_Q12", "num": 12, "q": "A high school senior sustained a concussion during a football game. Which of the following signs and symptoms would indicate the presence of postconcussion syndrome in the days and weeks following his injury?", "opts": ["Headaches and memory lapses", "Recurrent nosebleeds and hypersomnia", "Unilateral weakness and decreased coordination", "Neck pain and decreased neck range of motion"], "ans": 0, "years": [], "explanation": null}, {"id": "R21_Q13", "num": 13, "q": "An elderly male patient has been brought to the emergency department after experiencing stroke-like symptoms a few hours ago, and has been subsequently diagnosed with an ischemic stroke. The care team is eager to restore cerebral perfusion despite the likely death of the brain cells directly affected by the stroke. What is the rationale for the care teams emphasis on restoring circulation?", "opts": ["Failure to restore blood flow creates a severe risk for future transient ischemic attacks.", "Necrosis will continue unabated throughout the brain unless blood flow is restored.", "Cells of the penumbra may be saved from hypoxic damage if blood flow is promptly restored.", "Unless blood flow is restored, the patient faces the risk of progressing to hemorrhagic stroke."], "ans": 2, "years": [], "explanation": null}, {"id": "R21_Q14", "num": 14, "q": "A patients emergency magnetic resonance imaging (MRI) has been examined by the physician and tPA has been administered to the patient. What was this patients most likely diagnosis?", "opts": ["Status epilepticus", "Subarachnoid hemorrhage", "Ischemic stroke", "Encephalitis"], "ans": 2, "years": [], "explanation": null}, {"id": "R21_Q15", "num": 15, "q": "A patient has been diagnosed with a cerebral aneurysm and placed under close observation before treatment commences. Which of the following pathophysiologic conditions has contributed to this patients diagnosis?", "opts": ["Weakness in the muscular wall of an artery", "Impaired synthesis of clotting factors", "Deficits in the autonomic control of blood pressure", "Increased levels of cerebrospinal fluid"], "ans": 0, "years": [], "explanation": null}, {"id": "R21_Q16", "num": 16, "q": "Which of the following pathophysiologic processes occurs in cases of bacterial meningitis?", "opts": ["Infection in the cerebrospinal fluid causes vasoconstriction and cerebral hypoxia.", "Trauma introduces skin-borne pathogens to the cerebrospinal fluid.", "Infection in the cerebrospinal fluid causes spinal cord compression and neurologic deficits.", "Inflammation allows pathogens to cross into the cerebrospinal fluid."], "ans": 3, "years": [], "explanation": null}, {"id": "R21_Q17", "num": 17, "q": "Which of the following individuals has the highest chance of having a medulloblastoma?", "opts": ["An 88-year-old man who has begun displaying signs and symptoms of increased ICP", "A 60-year-old woman who is soon to begin radiation therapy for the treatment of breast cancer", "A 4-year-old child who has become uncoordinated in recent months", "A 68-year-old man who is a smoker and has a family history of cancer"], "ans": 2, "years": [], "explanation": null}, {"id": "R21_Q18", "num": 18, "q": "A patient with a history of a seizure disorder has been observed suddenly and repetitively patting his knee. After stopping this repetitive action, the patient appears confused and is oriented to person and place but not time. What type of seizure did this patient most likely experience?", "opts": ["Simple partial seizure", "Atonic seizure", "Myoclonic seizure", "Complex partial seizure"], "ans": 3, "years": [], "explanation": null}, {"id": "R21_Q19", "num": 19, "q": "A patient with a long history of cigarette smoking and poorly controlled hypertension has experienced recent psychomotor deficits as a result of hemorrhagic brain damage. The patients psychomotor deficits are likely the result of:", "opts": ["Alzheimer disease.", "frontotemporal dementia (FTD).", "vascular dementia.", "Wernicke-Korsakoff syndrome."], "ans": 2, "years": [], "explanation": null}, {"id": "R21_Q20", "num": 20, "q": "Which of the following statements by the husband of a patient with Alzheimer disease demonstrates an accurate understanding of his wifes medication regimen?", "opts": ["Im really hoping these medications will slow down her mental losses.", "Were both holding out hope that this medication will cure her Alzheimers.", "I know that this wont cure her, but we learned that it might prevent a bodily decline while she declines mentally.", "I learned that if we are vigilant about her medication schedule, she may not experience the physical effects of her disease."], "ans": 0, "years": [], "explanation": null}]}, {"id": "R22", "title": "Skin", "fullTitle": "Robbins Question Bank – Chapter 22: Skin", "source": "robbins", "questions": [{"id": "R22_Q1", "num": 1, "q": "Manifestations of superficial dermatophytosis of the skin include:", "opts": ["scaling.", "erythema.", "vesicles.", "infiltration."], "ans": 0, "years": [], "explanation": null}, {"id": "R22_Q2", "num": 2, "q": "Onychomycosis initially causes the toenail to appear as the fungus digests the nail keratin.", "opts": ["black", "cracked", "opaque", "eroded"], "ans": 2, "years": [], "explanation": null}, {"id": "R22_Q3", "num": 3, "q": "A yeast-like Candida albicans fungal infection can be differentiated from a tinea fungal infection by the presence of:", "opts": ["circular patches.", "satellite lesions.", "fungal spores.", "raised borders."], "ans": 1, "years": [], "explanation": null}, {"id": "R22_Q4", "num": 4, "q": "Warts develop when are invaded by human papillomavirus (HPV).", "opts": ["melanocytes", "keratinocytes", "sebaceous glands", "subcutaneous cells"], "ans": 1, "years": [], "explanation": null}, {"id": "R22_Q5", "num": 5, "q": "Allergic and hypersensitivity dermatoses are characterized by:", "opts": ["target lesions.", "dark erythema.", "epidermal edema.", "silver-white scale."], "ans": 2, "years": [], "explanation": null}, {"id": "R22_Q6", "num": 6, "q": "Papulosquamous dermatoses, such as psoriasis, are a group of skin disorders characterized by:", "opts": ["scaling papules.", "granular scabbing.", "raised red borders.", "nodular ulcerations."], "ans": 0, "years": [], "explanation": null}, {"id": "R22_Q7", "num": 7, "q": "A thermal burn described as involving the entire epidermis and dermis is classified as:", "opts": ["full third-degree.", "deep first-degree.", "partial second-degree.", "full-thickness second-degree."], "ans": 3, "years": [], "explanation": null}, {"id": "R22_Q8", "num": 8, "q": "The main cause of decubitus ulcers (bedsores) is that impairs the flow of blood and lymph.", "opts": ["external pressure", "shearing forces", "tissue edema", "thrombosis"], "ans": 0, "years": [], "explanation": null}, {"id": "R22_Q9", "num": 9, "q": "Dysplastic nevi are precursors of malignant melanoma that are:", "opts": ["larger than other nevi.", "oval epidermal nests.", "dermal cords of cells.", "brown rounded papules."], "ans": 0, "years": [], "explanation": null}, {"id": "R22_Q10", "num": 10, "q": "Which one of the following skin disorders seen in elderly persons is considered a premalignant lesion?", "opts": ["Cherry angiomas", "Actinic keratosis", "Solar lentigines", "Telangiectases"], "ans": 1, "years": [], "explanation": null}, {"id": "R22_Q11", "num": 11, "q": "Which of the following disorders of the skin is most likely to respond to treatment with systemic antibiotics?", "opts": ["Acne vulgaris", "Urticaria", "Atopic dermatitis", "Verrucae"], "ans": 0, "years": [], "explanation": null}, {"id": "R22_Q12", "num": 12, "q": "Dry, itchy plaques on her elbows and knees have prompted a 23-year-old woman to seek care. The clinician has subsequently diagnosed the patient with psoriasis, a disorder that results from:", "opts": ["increased epidermal cell turnover.", "an IgE-mediated immune reaction.", "hormonal influences on sebaceous gland activity.", "human papillomaviruses (HPV)."], "ans": 0, "years": [], "explanation": null}, {"id": "R22_Q13", "num": 13, "q": "A patient has been admitted to the intensive care unit of the hospital after developing toxic epidermal necrolysis (TEN) consequent to the administration of a sulfonamide antibiotic. What pathophysiologic phenomenon is likely the greatest immediate threat to this patients health?", "opts": ["The development of bacterial cellulitis on compromised skin surfaces", "Fluid and electrolyte imbalances resulting from the loss skin integrity", "A cascading autoimmune response that may result in shock", "The presence of diffuse lesions and skin sloughing on the patients mucous membranes"], "ans": 3, "years": [], "explanation": null}, {"id": "R22_Q14", "num": 14, "q": "A mans winter vacation to a tropical destination has been accompanied by repeated sunburns. What process accounts for the damaging effects of the suns radiation?", "opts": ["Initiation of an autoimmune response", "Compensatory increases in melanin production", "Damage to epidermal cell DNA and free radical production", "Hyperkeratinization and the formation of microscopic, subcutaneous lesions"], "ans": 2, "years": [], "explanation": null}, {"id": "R22_Q15", "num": 15, "q": "A 44-year-old man has been brought to the emergency department by emergency medical services with severe electrical burns resulting from a workplace accident. The most immediate threat to this patients survival at this time is:", "opts": ["infection.", "hemodynamic instability.", "acute pain.", "decreased protein synthesis and impaired healing."], "ans": 1, "years": [], "explanation": null}, {"id": "R22_Q16", "num": 16, "q": "A 79-year-old patient has been confined to bed after a severe hemorrhagic stroke that has caused hemiplegia. Which of the following measures should his care team prioritize in the prevention of pressure ulcers?", "opts": ["Prophylactic antibiotics", "Repositioning the patient on a scheduled basis", "Applying protective dressings to vulnerable areas", "Parenteral nutrition"], "ans": 1, "years": [], "explanation": null}, {"id": "R22_Q17", "num": 17, "q": "Which of the following actions involves the greatest risk of skin shearing?", "opts": ["Inserting a peripheral intravenous catheter", "Rolling the patient from a supine to side-lying position", "Pulling the patient up in bed", "Helping the patient ambulate after surgery"], "ans": 2, "years": [], "explanation": null}, {"id": "R22_Q18", "num": 18, "q": "What neoplasm of the skin is associated with the poorest prognosis?", "opts": ["Malignant melanoma", "Basal cell carcinoma", "Intraepidermal squamous cell carcinoma", "Invasive squamous cell carcinoma"], "ans": 0, "years": [], "explanation": null}, {"id": "R22_Q19", "num": 19, "q": "The transition of a melanoma from radial growth to vertical growth is associated with:", "opts": ["failure of the integrity of the basement membrane.", "involvement of the nonkeratinizing cells.", "spontaneous resolution.", "an increased risk of metastasis."], "ans": 3, "years": [], "explanation": null}, {"id": "R22_Q20", "num": 20, "q": "A 5-year-old girl has been presented for care by her father due to her recent development of macules on her trunk, extremities, and mucous membranes. The child is mildly febrile but her primary symptom is extreme pruritus. What disorder of the skin should the clinician who is assessing the child first suspect?", "opts": ["Varicella", "Lichen planus", "Rosacea", "Impetigo"], "ans": 0, "years": [], "explanation": null}]}];
const CONCEPT_LIBRARY = [
{match:/pathogenesis/i, why:"Pathogenesis is the mechanism by which a disease develops and produces its clinical and structural changes. When the stem gives a clue chain such as mutation → abnormal ion transport → thick mucus → recurrent infection, it is asking for the process linking cause to disease expression.", mnemonic:"Pathogenesis = pathway of disease.", trap:"Students often confuse cause with mechanism. Etiology is the cause; pathogenesis is how that cause produces disease."},
{match:/etiology/i, why:"Etiology means the cause of disease. If the stem asks what organism, exposure, mutation, or event is responsible, it is asking for etiology.", mnemonic:"Etiology = cause.", trap:"Do not confuse the microorganism or insult with the downstream mechanism."},
{match:/idiopathic/i, why:"Idiopathic means the cause is unknown. It does not mean congenital or genetic; it means the etiology has not been established.", mnemonic:"Idio = unknown cause.", trap:"Unknown cause is not the same as no mechanism."},
{match:/prognosis/i, why:"Prognosis is the expected outcome or future course of a disease, such as survival or risk of recurrence.", mnemonic:"Prognosis = prediction.", trap:"Complication happens during disease; prognosis predicts the future."},
{match:/complication|sequela/i, why:"A complication is an additional problem that develops as a consequence of an existing disease or injury. A sequela is a consequence that follows an earlier event.", mnemonic:"Complication = consequence added on.", trap:"Cause and consequence are different categories."},
{match:/iatrogen/i, why:"Iatrogenic disease is caused by medical intervention such as a procedure, drug, catheter, surgery, or oxygen therapy.", mnemonic:"Iatro = physician-caused.", trap:"The procedure is not the disease mechanism; it is the source of injury."},
{match:/congenital/i, why:"Congenital means present at birth. It may be genetic or acquired in utero, but the key point is that it exists from birth.", mnemonic:"Congenital = from birth.", trap:"Congenital does not automatically mean inherited."},
{match:/tyrosine kinase/i, why:"Constitutive tyrosine kinase signaling drives autonomous proliferation. In CML, the BCR-ABL fusion created by t(9;22) produces an always-on tyrosine kinase.", mnemonic:"BCR-ABL = always-on kinase.", trap:"Tumor suppressors restrain growth; oncogenic tyrosine kinases push it."},
{match:/cftr/i, why:"CFTR mutation causes defective chloride transport, dehydrated secretions, impaired mucociliary clearance, and recurrent pulmonary infection. Elevated sweat chloride is the classic clue.", mnemonic:"CFTR = chloride transport trouble.", trap:"Do not mix CFTR disease with hemoglobin or leukemia mutations."},
{match:/autonomous growth/i, why:"Autonomous growth means the cell can proliferate without normal external growth signals. Oncogenic mutations such as RAS or EGFR pathway activation create self-sustaining proliferative signaling.", mnemonic:"Autonomous growth = growth without permission.", trap:"This differs from evading growth suppression or resisting apoptosis."},
{match:/inhibition of apoptosis|apoptosis/i, why:"Apoptosis is programmed cell death. When cancer cells overexpress anti-apoptotic proteins such as BCL2, they survive when they should die.", mnemonic:"BCL2 blocks the death door.", trap:"Autonomous growth and apoptosis resistance are different hallmarks."},
{match:/genetic instability|dna repair/i, why:"Defective DNA repair causes genetic instability, allowing mutations to accumulate. That is why impaired repair increases cancer risk with age.", mnemonic:"Bad repair → more mutations.", trap:"The primary issue is mutation accumulation, not immediate immune evasion."},
{match:/growth repression|growth inhibition/i, why:"Loss of growth repression means tumor suppressor pathways such as RB are bypassed. HPV E7 is classic because it inactivates RB and removes the brake on the cell cycle.", mnemonic:"RB is the brake; E7 cuts the brake.", trap:"Growth factor stimulation and loss of suppression are not the same."},
{match:/liquefactive/i, why:"Liquefactive necrosis is correct because enzymatic digestion dominates, turning tissue into liquid debris. It is classic in brain infarcts and abscesses.", mnemonic:"Liquefactive = liquid brain or pus.", trap:"Do not default to coagulative for the brain; brain is the major exception."},
{match:/coagulative/i, why:"Coagulative necrosis is typical of ischemic injury in most solid organs such as heart and kidney. Protein denaturation preserves the basic tissue outline for a time.", mnemonic:"Coagulative = ghost outline preserved.", trap:"Brain infarcts are not coagulative; they become liquefactive."},
{match:/fat necrosis|steatosis/i, why:"Fat necrosis classically follows pancreatic lipase release or traumatic fat injury, causing saponification. Steatosis means triglyceride accumulation inside cells, especially hepatocytes.", mnemonic:"Fat necrosis = soap; steatosis = stored fat.", trap:"Necrosis of fat and accumulation of fat are different processes."},
{match:/caseous/i, why:"Caseous necrosis has a soft cheese-like granular appearance and is strongly associated with tuberculosis and some fungal granulomas.", mnemonic:"Caseating = cheesy center.", trap:"Sarcoidosis classically has noncaseating granulomas."},
{match:/lipofuscin/i, why:"Lipofuscin is a wear-and-tear pigment formed by lipid peroxidation of subcellular membranes. It accumulates with aging and in brown atrophy.", mnemonic:"Lipofuscin = old cell dust.", trap:"It is not iron and does not stain like hemosiderin."},
{match:/dystrophic calcification/i, why:"Dystrophic calcification is calcium deposition in dead or damaged tissue despite normal serum calcium. It marks prior injury, necrosis, or tissue destruction.", mnemonic:"Dystrophic = dead tissue calcium.", trap:"Metastatic calcification instead occurs in normal tissues because serum calcium is elevated."},
{match:/metastatic calcification/i, why:"Metastatic calcification occurs in otherwise normal tissues due to hypercalcemia, such as from hyperparathyroidism or bone destruction.", mnemonic:"Metastatic calcification = high calcium travels.", trap:"Dystrophic calcification does not require hypercalcemia."},
{match:/metaplasia/i, why:"Metaplasia is a reversible change where one mature cell type is replaced by another better able to tolerate stress, such as squamous metaplasia in smokers or columnar metaplasia in Barrett esophagus.", mnemonic:"Metaplasia changes type.", trap:"Metaplasia is adaptive; dysplasia reflects disordered growth."},
{match:/dysplasia/i, why:"Dysplasia means disordered epithelial growth with atypia, pleomorphism, hyperchromasia, and increased mitoses. It is pre-neoplastic but confined above the basement membrane unless invasion occurs.", mnemonic:"Dysplasia changes order.", trap:"Metaplasia is orderly replacement; dysplasia is atypical disorganization."},
{match:/hyperplasia/i, why:"Hyperplasia is an increase in the number of cells. It occurs in tissues capable of division, such as hormonal breast proliferation or liver regrowth after hepatectomy.", mnemonic:"Hyperplasia = more cells.", trap:"Muscle enlargement in pregnancy or athletes is often hypertrophy, not epithelial hyperplasia."},
{match:/hypertrophy/i, why:"Hypertrophy is an increase in cell size due to increased synthesis of structural proteins and organelles. It is typical in myocardium and skeletal muscle because these cells divide poorly.", mnemonic:"Hypertrophy = bigger cells.", trap:"Hyperplasia adds cell number; hypertrophy enlarges existing cells."},
{match:/atrophy/i, why:"Atrophy is shrinkage in cell size and often number due to decreased workload, loss of innervation, reduced blood supply, malnutrition, or aging.", mnemonic:"Atrophy = use less, lose mass.", trap:"Do not confuse thinning from atrophy with cell death by necrosis."},
{match:/necrosis/i, why:"Necrosis is unregulated cell death due to severe injury with membrane disruption and leakage of contents, so it commonly provokes inflammation.", mnemonic:"Necrosis = messy cell death.", trap:"Apoptosis is regulated and usually lacks surrounding inflammation."},
{match:/apoptosis/i, why:"Apoptosis is programmed cell death mediated by caspases. Membrane integrity is largely preserved, cell fragments are cleared quickly, and inflammation is limited.", mnemonic:"Apoptosis = neat cell death.", trap:"Necrosis leaks contents and inflames nearby tissue."},
{match:/neutrophil/i, why:"Neutrophils dominate acute bacterial infection and acute inflammation. They are the early responders recruited by chemokines.", mnemonic:"Acute = neutrophils now.", trap:"Macrophages and lymphocytes dominate later or chronic phases."},
{match:/histamine/i, why:"Histamine is a major immediate mediator of vasodilation and increased vascular permeability in acute inflammation, especially in allergy and mast-cell degranulation.", mnemonic:"Histamine = instant vasodilation and leak.", trap:"Cytokines help activate inflammation but are not the fastest immediate mediator."},
{match:/prostaglandin/i, why:"Prostaglandins contribute to vasodilation, fever, and especially pain sensitization. That is why NSAIDs reduce pain by blocking prostaglandin synthesis.", mnemonic:"PG = pain and pyrexia.", trap:"Bradykinin also contributes to pain, but prostaglandins are a classic tested mediator."},
{match:/chemokine/i, why:"Chemokines recruit leukocytes to the site of inflammation and guide their migration by chemotaxis.", mnemonic:"Chemokines = come here signals.", trap:"They recruit cells; they are not the main structural adhesion molecules."},
{match:/pecam/i, why:"PECAM-1 mediates transmigration, also called diapedesis, through the endothelium. It acts after rolling and firm adhesion.", mnemonic:"PECAM = pass between cells.", trap:"Selectins mediate rolling; integrin ligands such as ICAM mediate firm adhesion."},
{match:/ifn/i, why:"IFN-gamma from Th1 cells classically activates macrophages through the classical pathway and supports granulomatous inflammation.", mnemonic:"IFN-gamma gives macrophages the go signal.", trap:"IL-4 and IL-13 favor alternative activation and repair."},
{match:/granuloma|granulomatous/i, why:"Granulomatous inflammation is a chronic inflammatory pattern built from activated macrophages, often epithelioid histiocytes and giant cells, typically in tuberculosis, sarcoidosis, and some foreign body reactions.", mnemonic:"Granuloma = wall off what you cannot erase.", trap:"Acute abscesses are neutrophil-rich, not granulomatous."},
{match:/chronic inflammation/i, why:"Chronic inflammation features mononuclear cells, tissue destruction, and attempts at healing with angiogenesis and fibrosis.", mnemonic:"Chronic = mononuclear plus repair.", trap:"Acute inflammation instead emphasizes vascular change and neutrophils."},
{match:/tgf/i, why:"TGF-beta is the major pro-fibrotic cytokine. It stimulates fibroblasts and extracellular matrix deposition, making it central to fibrosis and scar formation.", mnemonic:"TGF-beta builds scar.", trap:"Inflammatory cytokines recruit cells, but TGF-beta is the classic fibrogenic signal."},
{match:/regeneration/i, why:"Regeneration restores tissue by proliferation of surviving cells and stem cells, returning the structure toward normal rather than replacing it with scar.", mnemonic:"Regeneration = replacement with the same tissue.", trap:"Fibrosis repairs by collagen, not by restoring original parenchyma."},
{match:/granulation tissue/i, why:"Granulation tissue is early repair tissue composed of proliferating capillaries, fibroblasts, and loose extracellular matrix. It fills wounds and ulcers before maturation into scar.", mnemonic:"Granulation tissue = vessels plus fibroblasts.", trap:"Do not confuse granulation tissue with granuloma; one is repair, the other is chronic inflammation."},
{match:/keloid/i, why:"A keloid is an exaggerated scar that extends beyond the boundaries of the original wound because collagen deposition is excessive and poorly controlled.", mnemonic:"Keloid = scar grows beyond.", trap:"A hypertrophic scar is raised but stays within the wound edges."},
{match:/hypertrophic scar/i, why:"A hypertrophic scar is a raised scar caused by excess collagen, but unlike a keloid it remains confined to the original wound.", mnemonic:"Hypertrophic scar = raised yet restrained.", trap:"Keloids spill beyond the wound margin."},
{match:/endothelial injury/i, why:"Endothelial injury is a major trigger of thrombosis because it exposes subendothelial matrix, promotes platelet adhesion, and shifts the surface toward a procoagulant state.", mnemonic:"Damaged endothelium invites clot.", trap:"Stasis and hypercoagulability are the other major parts of Virchow triad."},
{match:/immobilization|bed stay/i, why:"Immobilization causes venous stasis, a major component of Virchow triad, and strongly predisposes to deep venous thrombosis.", mnemonic:"Virchow triad: vessel wall, viscosity, velocity.", trap:"Do not miss stasis in a bedridden patient."},
{match:/fat embolism/i, why:"Fat embolism classically follows fracture of a long bone or major soft tissue trauma, when marrow fat enters the circulation.", mnemonic:"Long bone fracture → fat embolus.", trap:"Pulmonary thromboembolism usually comes from DVT, not marrow fat."},
{match:/pulmonary embol/i, why:"Pulmonary embolism usually arises from thrombi in deep leg veins. The lung can become hemorrhagic because it has a dual blood supply.", mnemonic:"DVT goes to the lung.", trap:"Systemic arterial emboli instead travel to organs like brain, kidney, or spleen."},
{match:/thromboembol/i, why:"Thromboembolism is the most common clinically important embolic event. It is simply an embolus made of detached thrombotic material.", mnemonic:"Most emboli are thromboemboli.", trap:"Fat, air, and amniotic fluid emboli are special categories."},
{match:/white infarct/i, why:"White or anemic infarcts occur in solid organs with end-arterial blood supply such as heart, kidney, and spleen.", mnemonic:"White infarct = solid organ, single supply.", trap:"Red infarcts occur in loose tissues, venous occlusion, or tissues with dual supply."},
{match:/hemorrhagic|pulmonary/i, why:"Pulmonary infarcts are often hemorrhagic because the lung has a dual blood supply and loose tissue architecture.", mnemonic:"Lung infarct = red infarct.", trap:"Renal and splenic infarcts are typically pale."},
{match:/endothelial dysfunction/i, why:"Atherogenesis starts with endothelial dysfunction, which increases permeability, leukocyte adhesion, and thrombogenicity and allows lipid entry into the intima.", mnemonic:"Athero starts with a bad endothelium.", trap:"LDL oxidation and smooth muscle migration occur later."},
{match:/siadh/i, why:"SIADH causes hyponatremia with low serum osmolality but inappropriately concentrated urine because ADH keeps water in the body.", mnemonic:"SIADH = low sodium, concentrated urine.", trap:"In pure water deprivation, sodium rises rather than falls."},
{match:/diabetes insipidus|di\b/i, why:"Diabetes insipidus causes free water loss, hypernatremia, and inappropriately dilute urine because ADH effect is absent.", mnemonic:"DI = dry inside.", trap:"SIADH does the opposite: water retention and hyponatremia."},
{match:/dehydration/i, why:"Dehydration from low water intake produces hypernatremia and increased serum osmolality. If kidneys still respond, urine becomes concentrated and sodium excretion is low.", mnemonic:"Water loss concentrates sodium.", trap:"SIADH gives low sodium, not high sodium."},
{match:/cardiogenic shock/i, why:"Cardiogenic shock is pump failure. Decreased cardiac output leads to tissue hypoperfusion despite adequate intravascular volume.", mnemonic:"Cardiogenic shock = pump fails.", trap:"Distributive shock is vasodilation; hypovolemic shock is volume loss."},
{match:/septic|distributive shock/i, why:"Septic shock is a distributive shock driven by widespread inflammatory vasodilation and endothelial dysfunction, causing maldistributed flow and hypotension.", mnemonic:"Distributive shock = vessels too wide.", trap:"Cardiogenic shock is not primarily a vasodilation problem."},
{match:/hyperemia/i, why:"Hyperemia is an active process caused by arteriolar dilation and increased inflow, giving tissue a red appearance.", mnemonic:"Hyperemia = active inflow.", trap:"Congestion is passive impaired outflow and often looks dark blue-red."},
{match:/congestion/i, why:"Congestion is passive vascular engorgement due to impaired venous outflow. Tissues become heavy, dark, and edematous.", mnemonic:"Congestion = blood cannot leave.", trap:"Hyperemia is active increased inflow."},
{match:/apo.?b-?100/i, why:"ApoB-100 is the structural apolipoprotein of LDL and mediates binding to the LDL receptor.", mnemonic:"B-100 belongs to LDL.", trap:"ApoB-48 is for chylomicrons, not LDL."},
{match:/apo.?c-?ii/i, why:"ApoC-II activates lipoprotein lipase, which hydrolyzes triglycerides in circulating lipoproteins.", mnemonic:"C-II turns on LPL.", trap:"LCAT is activated by ApoA-I, not ApoC-II."},
{match:/mature teratoma/i, why:"A mature teratoma contains differentiated tissues from more than one germ layer, such as hair, teeth, cartilage, and skin.", mnemonic:"Teratoma = many mature tissues together.", trap:"A hamartoma is disorganized tissue native to that site; a choristoma is normal tissue in an abnormal site."},
{match:/metastasis/i, why:"Metastasis is the most reliable feature that proves malignancy because it shows the tumor can invade, travel, and colonize a distant site.", mnemonic:"Malignancy proven by metastasis.", trap:"Dysplasia and metaplasia are not sufficient to call a lesion malignant."},
{match:/degree of differentiation/i, why:"Tumor grading is based mainly on how differentiated the tumor is and how closely it resembles the original tissue.", mnemonic:"Grade = how ugly; stage = how far.", trap:"TNM is staging, not grading."},
{match:/carcinoma in situ/i, why:"Carcinoma in situ is full-thickness epithelial dysplasia without invasion through the basement membrane.", mnemonic:"In situ = malignant cytology, no invasion.", trap:"Once basement membrane is breached, it becomes invasive carcinoma."},

const STORAGE_KEY = 'pathology-mcq-bank-progress-v2';

const state = {
  lessonId: null,
  currentIndex: 0,
  selectedYears: [],
  wrongOnly: false,
  progress: {},
  showExplanationFor: {},
  tempSelections: {},
  view: 'study'
};

function saveProgress() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    progress: state.progress,
    showExplanationFor: state.showExplanationFor,
    tempSelections: state.tempSelections
  }));
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    state.progress = parsed.progress || {};
    state.showExplanationFor = parsed.showExplanationFor || {};
    state.tempSelections = parsed.tempSelections || {};
  } catch (e) {
    console.error('Failed to load progress', e);
  }
}

function getLessonById(id) {
  return LESSONS.find(l => l.id === id) || null;
}

function isMultiAnswer(question) {
  return Array.isArray(question && question.ans);
}

function getCorrectAnswers(question) {
  return isMultiAnswer(question) ? question.ans.slice().sort((a,b)=>a-b) : [question.ans];
}

function normalizeSelectedValue(selected) {
  if (Array.isArray(selected)) return selected.slice().sort((a,b)=>a-b);
  return typeof selected === 'number' ? [selected] : [];
}

function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) {
    if (a[i] !== b[i]) return false;
  }
  return true;
}

function lessonHasYearData(lesson) {
  return extractYearsFromLesson(lesson).length > 0;
}

function normalizeTerm(s) {
  return (s || '').toLowerCase().replace(/[\u2019']/g, "'").trim();
}

function extractYearsFromLesson(lesson) {
  const years = new Set();
  lesson.questions.forEach(q => (q.years || []).forEach(y => years.add(y)));
  return [...years].sort((a,b) => Number(b) - Number(a));
}

function getFilteredQuestions(lesson) {
  let items = lesson.questions.slice();
  if (state.selectedYears.length && lessonHasYearData(lesson)) {
    items = items.filter(q => (q.years || []).some(y => state.selectedYears.includes(y)));
  }
  if (state.wrongOnly) {
    items = items.filter(q => {
      const p = state.progress[q.id];
      return p && p.correct === false;
    });
  }
  return items;
}

function getQuestionProgress(qid) {
  return state.progress[qid] || null;
}

function getLessonStats(lesson) {
  let correct = 0, wrong = 0, answered = 0;
  lesson.questions.forEach(q => {
    const p = getQuestionProgress(q.id);
    if (!p) return;
    answered++;
    if (p.correct) correct++;
    else wrong++;
  });
  return { total: lesson.questions.length, answered, correct, wrong, skipped: lesson.questions.length - answered };
}

function getFilteredStats(lesson, filtered) {
  let correct = 0, wrong = 0, answered = 0;
  filtered.forEach(q => {
    const p = getQuestionProgress(q.id);
    if (!p) return;
    answered++;
    if (p.correct) correct++;
    else wrong++;
  });
  return {
    total: filtered.length,
    answered,
    correct,
    wrong,
    skipped: filtered.length - answered,
    accuracy: answered ? Math.round((correct / answered) * 100) : 0
  };
}

function chooseLessonIfNeeded() {
  if (!state.lessonId && LESSONS.length) state.lessonId = LESSONS[0].id;
}

function renderSidebar() {
  chooseLessonIfNeeded();
  const sidebar = document.getElementById('sidebar');
  const activeLesson = getLessonById(state.lessonId);
  const yearChips = activeLesson ? extractYearsFromLesson(activeLesson) : [];
  const hasYearData = !!(activeLesson && lessonHasYearData(activeLesson));
  const bookletLessons = LESSONS.filter(lesson => lesson.source !== 'robbins');
  const robbinsLessons = LESSONS.filter(lesson => lesson.source === 'robbins');

  function renderLessonGroup(title, items) {
    return `
      <section class="filter-block">
        <div class="filter-title">${title} <span>${items.length}</span></div>
        <div class="lessons">
          ${items.map(lesson => {
            const stats = getLessonStats(lesson);
            const active = lesson.id === state.lessonId ? 'active' : '';
            const sourceTag = lesson.source === 'robbins' ? 'No years' : 'Years';
            return `
              <button class="lesson-btn ${active}" onclick="openLesson('${lesson.id}')">
                <div class="lesson-top">
                  <div class="lesson-title">${escapeHtml(lesson.title)}</div>
                  <div class="tag">${lesson.questions.length}</div>
                </div>
                <div class="lesson-meta">
                  <span class="tag">${sourceTag}</span>
                  <span class="tag">Ans ${stats.answered}</span>
                  <span class="tag">✓ ${stats.correct}</span>
                  <span class="tag">✗ ${stats.wrong}</span>
                </div>
              </button>
            `;
          }).join('')}
        </div>
      </section>
    `;
  }

  sidebar.innerHTML = `
    <div class="brand">
      <h1>Pathology MCQ Bank</h1>
      <p>Single-file study app built from the booklet and Robbins question bank. Warm paper palette. Fast local storage. Direct question jumps. Wrong-question review.</p>
      <div class="byline">By @YousefBehzadi</div>
    </div>

    <section class="filter-block">
      <div class="filter-title">Year Filter</div>
      <div class="chips">
        <button class="chip mono ${state.selectedYears.length===0 ? 'active' : ''}" onclick="setAllYears()">All Years</button>
        ${hasYearData
          ? yearChips.map(y => `<button class="chip mono ${state.selectedYears.includes(y) ? 'active' : ''}" onclick="toggleYear('${y}')">${y}</button>`).join('')
          : `<span class="chip mono active" style="cursor:default">No year data</span>`}
      </div>
    </section>

    <section class="filter-block">
      <div class="filter-title">Question Filter</div>
      <div class="chips">
        <button class="chip ${!state.wrongOnly ? 'active' : ''}" onclick="setWrongOnly(false)">All questions</button>
        <button class="chip ${state.wrongOnly ? 'active' : ''}" onclick="setWrongOnly(true)">Wrong questions only</button>
      </div>
    </section>

    ${renderLessonGroup('FB2 Booklet Lessons', bookletLessons)}
    ${renderLessonGroup('Robbins Question Bank', robbinsLessons)}
  `;
}

function openLesson(lessonId) {
  state.lessonId = lessonId;
  state.currentIndex = 0;
  state.view = 'study';
  const lesson = getLessonById(lessonId);
  if (lesson && !lessonHasYearData(lesson)) state.selectedYears = [];
  renderAll();
}

function setAllYears() {
  state.selectedYears = [];
  state.currentIndex = 0;
  state.view = 'study';
  renderAll();
}

function toggleYear(year) {
  if (state.selectedYears.includes(year)) {
    state.selectedYears = state.selectedYears.filter(y => y !== year);
  } else {
    state.selectedYears = [year];
  }
  state.currentIndex = 0;
  state.view = 'study';
  renderAll();
}

function setWrongOnly(value) {
  state.wrongOnly = value;
  state.currentIndex = 0;
  state.view = 'study';
  renderAll();
}

function openResults() {
  state.view = 'results';
  renderMain();
}

function applyFilters() {
  const lesson = getLessonById(state.lessonId);
  if (!lesson) return [];
  const filtered = getFilteredQuestions(lesson);
  if (state.currentIndex > filtered.length - 1) state.currentIndex = Math.max(0, filtered.length - 1);
  return filtered;
}

function selectAnswer(optionIndex) {
  const filtered = applyFilters();
  const q = filtered[state.currentIndex];
  if (!q) return;
  const existing = getQuestionProgress(q.id);
  if (existing && existing.answered) return;

  if (isMultiAnswer(q)) {
    const current = Array.isArray(state.tempSelections[q.id]) ? state.tempSelections[q.id].slice() : [];
    const next = current.includes(optionIndex)
      ? current.filter(i => i !== optionIndex)
      : current.concat(optionIndex);
    state.tempSelections[q.id] = next.sort((a,b)=>a-b);
    saveProgress();
    renderMain();
    return;
  }

  state.progress[q.id] = {
    answered: true,
    selected: optionIndex,
    correct: optionIndex === q.ans,
    answeredAt: Date.now()
  };
  delete state.tempSelections[q.id];
  state.showExplanationFor[q.id] = true;
  saveProgress();
  renderAll();
}

function submitCurrentAnswer() {
  const filtered = applyFilters();
  const q = filtered[state.currentIndex];
  if (!q || !isMultiAnswer(q)) return;
  const existing = getQuestionProgress(q.id);
  if (existing && existing.answered) return;
  const selected = normalizeSelectedValue(state.tempSelections[q.id]);
  if (!selected.length) return;
  const correctAnswers = getCorrectAnswers(q);
  state.progress[q.id] = {
    answered: true,
    selected,
    correct: arraysEqual(selected, correctAnswers),
    answeredAt: Date.now()
  };
  delete state.tempSelections[q.id];
  state.showExplanationFor[q.id] = true;
  saveProgress();
  renderAll();
}

function toggleExplanation() {
  const filtered = applyFilters();
  const q = filtered[state.currentIndex];
  if (!q) return;
  state.showExplanationFor[q.id] = !state.showExplanationFor[q.id];
  saveProgress();
  renderMain();
}

function prevQuestion() {
  if (state.currentIndex > 0) {
    state.currentIndex--;
    renderMain();
  }
}

function nextQuestion() {
  const filtered = applyFilters();
  if (state.currentIndex < filtered.length - 1) {
    state.currentIndex++;
    renderMain();
  } else {
    openResults();
  }
}

function jumpToQuestion(index) {
  state.currentIndex = index;
  state.view = 'study';
  renderMain();
}

function retryLesson() {
  const lesson = getLessonById(state.lessonId);
  if (!lesson) return;
  lesson.questions.forEach(q => {
    delete state.progress[q.id];
    delete state.tempSelections[q.id];
  });
  state.currentIndex = 0;
  state.view = 'study';
  saveProgress();
  renderAll();
}

function retryWrongQuestions() {
  const lesson = getLessonById(state.lessonId);
  if (!lesson) return;
  lesson.questions.forEach(q => {
    const p = state.progress[q.id];
    if (p && p.correct === false) {
      delete state.progress[q.id];
      delete state.tempSelections[q.id];
    }
  });
  state.wrongOnly = true;
  state.currentIndex = 0;
  state.view = 'study';
  saveProgress();
  renderAll();
}

function backToAllLessons() {
  state.wrongOnly = false;
  state.selectedYears = [];
  state.currentIndex = 0;
  state.view = 'study';
  renderAll();
}

function escapeHtml(str) {
  return (str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function lessonTone(title) {
  const t = title.toLowerCase();
  if (t.includes('cell injury') || t.includes('adaptation')) return 'cell injury, adaptation, necrosis, and reversible versus irreversible damage';
  if (t.includes('inflammation')) return 'acute versus chronic inflammation, mediators, vascular change, leukocyte recruitment, and repair';
  if (t.includes('healing') || t.includes('fracture')) return 'repair, regeneration, scar formation, granulation tissue, and wound or bone healing';
  if (t.includes('thrombosis') || t.includes('embol') || t.includes('infarct')) return 'Virchow triad, thrombosis, embolic travel, and infarct patterns';
  if (t.includes('shock') || t.includes('hemodynamic')) return 'perfusion failure, edema, hyperemia, congestion, and shock mechanisms';
  if (t.includes('neoplasia') || t.includes('carcinogenesis')) return 'tumor biology, grading, staging, invasion, metastasis, and molecular hallmarks';
  if (t.includes('amyloid')) return 'misfolded protein deposition and extracellular organ damage';
  if (t.includes('calcification') || t.includes('accumulations')) return 'pigments, mineral deposition, and intracellular or extracellular accumulation';
  if (t.includes('aging') || t.includes('nutrition')) return 'age-related change, deficiency states, and systemic pathophysiology';
  if (t.includes('molecular')) return 'molecular pathology, oncogenes, tumor suppressors, DNA repair, and signaling pathways';
  if (t.includes('fluid') || t.includes('electrolyte')) return 'osmolar balance, sodium-water disorders, and body-fluid shifts';
  if (t.includes('lipid')) return 'lipoproteins, dyslipidemia, metabolic syndrome, and cardiovascular risk';
  if (t.includes('plasma proteins')) return 'transport proteins, acute-phase reactants, and protein markers used in disease';
  return 'core pathology mechanisms and distinguishing diagnostic clues';
}

function getConceptInfo(text) {
  const normalized = normalizeTerm(text);
  for (const item of CONCEPT_LIBRARY) {
    if (item.match.test(normalized)) return item;
  }
  return null;
}

function getFallbackExplanation(question, lessonTitle) {
  const correctAnswers = getCorrectAnswers(question);
  const correctLabels = correctAnswers.map(i => question.opts[i]).filter(Boolean);
  const correct = correctLabels.join(' + ');
  const correctInfo = correctLabels.length === 1 ? getConceptInfo(correct) : null;
  const lessonHint = lessonTone(lessonTitle);
  const questionText = question.q;

  let whyCorrect = correctInfo
    ? correctInfo.why
    : `This answer set is the best fit because the stem is testing ${lessonHint}, and the clue pattern points most strongly to ${correct}. In exam terms, match the clinical clue or morphologic finding to the mechanism, not just to a familiar word.`;

  if (/select all that apply/i.test(questionText) || correctAnswers.length > 1) {
    whyCorrect += ` This is a multi-select item, so every correct option must fit the mechanism being tested and every omitted correct option makes the overall choice incomplete.`;
  }

  if (/patient|man|woman|boy|girl|old|presented|diagnosed|biopsy|autopsy|x-ray|history/i.test(questionText)) {
    whyCorrect += ` The stem is case-based, so the safest method is clue chain reasoning: symptom or finding → mechanism → pathology concept → best answer.`;
  }

  const whyWrong = question.opts.map((opt, i) => {
    if (correctAnswers.includes(i)) return null;
    const info = getConceptInfo(opt);
    if (info) return `${opt} is wrong because ${info.why.charAt(0).toLowerCase() + info.why.slice(1)}`;
    return `${opt} is wrong because it does not match the main mechanism, morphology, sequence, or diagnostic clue being tested in this stem.`;
  }).filter(Boolean);

  const mnemonic = correctInfo
    ? correctInfo.mnemonic
    : `${correct} = link each correct option to the same core mechanism or diagnostic pattern.`;

  const trap = correctInfo
    ? correctInfo.trap
    : `Exam trap: do not choose options that are merely related to the topic. Choose only the option or option set that matches the specific clue chain in the stem.`;

  return { whyCorrect, whyWrong, mnemonic, trap };
}

function getExplanation(question, lessonTitle) {
  return question.explanation || getFallbackExplanation(question, lessonTitle);
}

function renderQuestionNavigator(filtered) {
  return `
    <section class="navigator-wrap">
      <div class="navigator-head">
        <h3 class="navigator-title">Question Navigator</h3>
        <div class="year-tags">
          <span class="tag">Jump directly to any question</span>
          <span class="tag">Green = correct</span>
          <span class="tag">Red = wrong</span>
        </div>
      </div>
      <div class="navigator-grid">
        ${filtered.map((q, idx) => {
          const p = getQuestionProgress(q.id);

}

function renderEmptyState(lesson) {

      <div class="controls" style="margin-top:18px">

          <button class="btn ghost" onclick="backToAllLessons()">Back to all lessons</button>
        </div>
      </div>

  `;
}

function renderQuestion(lesson, filtered) {
  const q = filtered[state.currentIndex];
  const p = getQuestionProgress(q.id);
  const explanation = getExplanation(q, lesson.title);
  const isOpen = !!state.showExplanationFor[q.id];
  const stats = getFilteredStats(lesson, filtered);
  const answeredCurrent = !!p;
  const allAnswered = stats.answered === stats.total && stats.total > 0;
  const multi = isMultiAnswer(q);
  const pendingSelections = normalizeSelectedValue(state.tempSelections[q.id]);
  const selectedValues = answeredCurrent ? normalizeSelectedValue(p.selected) : pendingSelections;
  const correctAnswers = getCorrectAnswers(q);

  const yearsMarkup = (q.years && q.years.length)
    ? q.years.map(y => `<span class="tag">${y}</span>`).join('')
    : `<span class="tag">${lesson.source === 'robbins' ? 'Robbins · no year' : 'Year N/A'}</span>`;

  return `
    <section class="hero">
      <div class="hero-top">
        <div>
          <h2>${escapeHtml(lesson.title)}</h2>
          <p>${escapeHtml(lesson.fullTitle)} · ${filtered.length} question${filtered.length===1?'':'s'} in the current filter.</p>
        </div>
        <div class="year-tags">
          <span class="tag">Lesson count ${lesson.questions.length}</span>
          <span class="tag">${lesson.source === 'robbins' ? 'Robbins question bank' : 'FB2 booklet'}</span>
          <span class="tag">${state.wrongOnly ? 'Wrong-only mode' : 'All-question mode'}</span>
        </div>
      </div>
      <div class="stat-row">
        <div class="stat"><div class="stat-label">Answered</div><div class="stat-value">${stats.answered} / ${stats.total}</div></div>
        <div class="stat"><div class="stat-label">Correct</div><div class="stat-value">${stats.correct}</div></div>
        <div class="stat"><div class="stat-label">Wrong</div><div class="stat-value">${stats.wrong}</div></div>
        <div class="stat"><div class="stat-label">Accuracy</div><div class="stat-value">${stats.accuracy}%</div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-line">
          <div class="progress-bar" style="width:${stats.total ? Math.round(((state.currentIndex+1)/stats.total)*100) : 0}%"></div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="q-top">
        <div>
          <div class="q-index"><span class="num">Q ${state.currentIndex + 1}</span> <span>${state.currentIndex + 1} / ${filtered.length}</span></div>
        </div>
        <div class="year-tags">
          ${yearsMarkup}
          ${multi ? `<span class="tag">Multi-select</span>` : ``}
        </div>
      </div>

      <p class="q-text">${escapeHtml(q.q)}</p>

      <div class="options">
        ${q.opts.map((opt, idx) => {
          let cls = 'option';
          let meta = '';
          const isCorrect = correctAnswers.includes(idx);
          const isSelected = selectedValues.includes(idx);

          if (answeredCurrent) {
            cls += ' locked';
            if (isCorrect) {
              cls += ' correct';
              meta = isSelected && multi ? 'Correct choice' : 'Correct answer';
            } else {
              cls += ' incorrect';
              meta = isSelected ? 'Your choice' : 'Incorrect option';
            }
            if (isSelected && !isCorrect) cls += ' selected-wrong';
          } else if (multi && isSelected) {
            cls += ' pending';
            meta = 'Selected';
          }

          return `
            <button class="${cls}" onclick="selectAnswer(${idx})">
              <span class="letter">${String.fromCharCode(65 + idx)}</span>
              <span class="body">
                <span class="text">${escapeHtml(opt)}</span>
                ${(answeredCurrent || (multi && isSelected)) ? `<div class="meta">${meta}</div>` : ''}
              </span>
            </button>
          `;
        }).join('')}
      </div>

      <div class="controls">
        <div class="control-left">
          <button class="btn secondary" onclick="prevQuestion()" ${state.currentIndex===0 ? 'disabled' : ''}>Prev</button>
          ${multi && !answeredCurrent
            ? `<button class="btn primary" onclick="submitCurrentAnswer()" ${pendingSelections.length===0 ? 'disabled' : ''}>Check answer</button>`
            : `<button class="btn primary" onclick="nextQuestion()">${state.currentIndex===filtered.length-1 ? 'Finish' : 'Next'}</button>`}
          ${multi && answeredCurrent
            ? `<button class="btn primary" onclick="nextQuestion()">${state.currentIndex===filtered.length-1 ? 'Finish' : 'Next'}</button>`
            : ``}
          <button class="btn ghost" onclick="toggleExplanation()">${isOpen ? 'Hide explanation' : 'Show explanation'}</button>
        </div>
        <div class="control-right">
          <button class="btn secondary" onclick="retryLesson()">Retry lesson</button>
          <button class="btn warn" onclick="retryWrongQuestions()">Retry wrong questions</button>
          <button class="btn ghost" onclick="backToAllLessons()">Back to all lessons</button>
        </div>
      </div>

      <section class="explanation ${isOpen ? 'open' : ''}">
        <h3>Explanation</h3>
        <div class="expl-block">
          <div class="expl-label">Why the correct answer is correct</div>
          <div class="expl-text">${escapeHtml(explanation.whyCorrect)}</div>
        </div>
        <div class="expl-block">
          <div class="expl-label">Why the other options are wrong</div>
          <ul class="expl-list">
            ${explanation.whyWrong.map(item => `<li>${escapeHtml(item)}</li>`).join('')}
          </ul>
        </div>
        <div class="expl-block">
          <div class="expl-label">Mnemonic</div>
          <div class="expl-text">${escapeHtml(explanation.mnemonic)}</div>
        </div>
        <div class="expl-block">
          <div class="expl-label">Exam trap</div>
          <div class="expl-text">${escapeHtml(explanation.trap)}</div>
        </div>
      </section>
    </section>

    ${renderQuestionNavigator(filtered)}

    ${allAnswered ? `
      <section class="empty-card">
        <h3>All questions in this filter are answered</h3>
        <p>You can still jump to any question, review explanations, or open the results screen now.</p>
        <div class="controls" style="margin-top:18px">
          <div class="control-left">
            <button class="btn primary" onclick="openResults()">Open results</button>
            <button class="btn secondary" onclick="retryLesson()">Retry lesson</button>
          </div>
        </div>
      </section>
    ` : ''}
  `;
}

function renderMain() {
  chooseLessonIfNeeded();
  const app = document.getElementById('app');
  const lesson = getLessonById(state.lessonId);
  if (!lesson) {
    app.innerHTML = `<section class="empty-card"><h3>No lesson loaded</h3><p>Select a lesson from the sidebar.</p></section>`;
    return;
  }
  const filtered = applyFilters();
  if (!filtered.length) {
    app.innerHTML = renderEmptyState(lesson);
    return;
  }
  if (state.view === 'results') {
    app.innerHTML = renderResults(lesson, filtered);
    return;
  }
  app.innerHTML = renderQuestion(lesson, filtered);
}

function renderAll() {
  renderSidebar();
  renderMain();
}

loadProgress();
chooseLessonIfNeeded();
renderAll();
</script>
</body>
</html>
